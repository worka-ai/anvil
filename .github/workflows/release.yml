name: Anvil Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: anvil-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-image:
    name: Build release image (${{ matrix.platform }})
    runs-on: [self-hosted, worka-builder-1]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            image: anvil:test-amd64
            artifact: anvil-test-image-amd64
          - platform: linux/arm64
            arch: arm64
            image: anvil:test-arm64
            artifact: anvil-test-image-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Set up QEMU for cross-architecture image smoke checks
        uses: docker/setup-qemu-action@v3

      - name: Install Zig for release-shaped Rust builds
        uses: mlugg/setup-zig@v2

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-release-cargo-v2-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-v2-${{ matrix.arch }}-
            ${{ runner.os }}-release-cargo-v2-
            ${{ runner.os }}-cargo-v2-

      - name: Install cargo-zigbuild for release-shaped Rust builds
        run: |
          if ! command -v cargo-zigbuild >/dev/null 2>&1; then
            cargo install cargo-zigbuild --locked
          fi

      - name: Build Docker image from host-built binaries
        env:
          ANVIL_IMAGE: ${{ matrix.image }}
          ANVIL_DOCKER_PLATFORM: ${{ matrix.platform }}
          ANVIL_BUILD_PROFILE: release
          CARGO_BUILD_JOBS: "2"
        run: ./scripts/build-image.sh

      - name: Smoke check image binaries
        run: |
          timeout 30s docker run --platform ${{ matrix.platform }} --rm ${{ matrix.image }} anvil-server --version
          timeout 30s docker run --platform ${{ matrix.platform }} --rm ${{ matrix.image }} anvil --version
          timeout 30s docker run --platform ${{ matrix.platform }} --rm ${{ matrix.image }} anvil-admin --version

      - name: Export Docker image artifact
        run: docker save ${{ matrix.image }} -o /tmp/${{ matrix.artifact }}.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/${{ matrix.artifact }}.tar
          compression-level: 0
          retention-days: 1

  static-and-docs:
    name: Static gates and docs artifact
    runs-on: [self-hosted, worka-builder-1]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-release-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-v2-
            ${{ runner.os }}-cargo-v2-

      - name: Install Fission CLI
        run: |
          if ! command -v fission >/dev/null 2>&1; then
            cargo install cargo-fission --version 0.4.1 --locked
          fi

      - name: Run static release gates
        run: ./scripts/release-gates.sh static

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/target/fission/site

  rust-unit:
    name: Rust unit and client tests
    runs-on: [self-hosted, worka-builder-1]
    timeout-minutes: 45
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-release-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-v2-
            ${{ runner.os }}-cargo-v2-

      - name: Run Rust unit release gates
        run: ./scripts/release-gates.sh rust

  server-core:
    name: Server core integration tests
    runs-on: [self-hosted, worka-builder-1]
    timeout-minutes: 60
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-release-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-v2-
            ${{ runner.os }}-cargo-v2-

      - name: Prebuild server integration test binaries
        run: cargo test --no-run -p anvil-server --tests

      - name: Run server core integration gates
        run: ./scripts/release-gates.sh server-core

  docker-integration:
    name: Docker integration tests (${{ matrix.group }})
    needs: build-image
    runs-on: [self-hosted, worka-builder-1]
    timeout-minutes: 120
    env:
      CARGO_BUILD_JOBS: "2"
    strategy:
      fail-fast: false
      matrix:
        group: [docker-auth, docker-storage, docker-index, docker-mesh]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-release-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-v2-
            ${{ runner.os }}-cargo-v2-

      - name: Prebuild Docker integration test binaries
        run: cargo test --no-run -p anvil-server -p anvil-storage-cli --tests

      - name: Download amd64 Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: anvil-test-image-amd64
          path: /tmp/anvil-image-amd64

      - name: Load amd64 Docker image
        run: docker load -i /tmp/anvil-image-amd64/anvil-test-image-amd64.tar

      - name: Run Docker integration release gates
        env:
          ANVIL_IMAGE: anvil:test-amd64
          ANVIL_DOCKER_TEST_PROJECT: anvil-release-${{ matrix.group }}-${{ github.run_id }}-${{ github.run_attempt }}
          ANVIL_GATE_STEP_TIMEOUT_SECONDS: "5400"
        run: ./scripts/release-gates.sh ${{ matrix.group }}

  publish:
    name: Publish release artifacts
    needs: [build-image, static-and-docs, rust-unit, server-core, docker-integration]
    runs-on: [self-hosted, worka-builder-1]
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.docs-deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-release-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-v2-
            ${{ runner.os }}-cargo-v2-

      - name: Determine release tag
        id: release-tag
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag || '' }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download amd64 Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: anvil-test-image-amd64
          path: /tmp/anvil-image-amd64

      - name: Download arm64 Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: anvil-test-image-arm64
          path: /tmp/anvil-image-arm64

      - name: Load tested Docker image artifacts
        run: |
          docker load -i /tmp/anvil-image-amd64/anvil-test-image-amd64.tar
          docker load -i /tmp/anvil-image-arm64/anvil-test-image-arm64.tar

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy documentation before release publication
        id: docs-deployment
        uses: actions/deploy-pages@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tested multi-arch Docker image
        id: docker-push
        shell: bash
        run: |
          tag="${{ steps.release-tag.outputs.tag }}"
          repo="ghcr.io/${{ github.repository }}"
          image="${repo}:${tag}"
          amd64_image="${repo}:${tag}-amd64"
          arm64_image="${repo}:${tag}-arm64"
          docker tag anvil:test-amd64 "$amd64_image"
          docker tag anvil:test-arm64 "$arm64_image"
          docker push "$amd64_image"
          docker push "$arm64_image"
          docker buildx imagetools create \
            -t "$image" \
            -t "${repo}:latest" \
            "$amd64_image" \
            "$arm64_image"
          digest="$(docker buildx imagetools inspect "$image" --format '{{.Manifest.Digest}}')"
          if [[ -z "$digest" || "$digest" != sha256:* ]]; then
            echo "failed to resolve published image digest for $image" >&2
            exit 1
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Publish Rust client crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is required to publish anvil-storage" >&2
            exit 1
          fi
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="anvil-storage") | .version')"
          if scripts/crate-version-exists.py anvil-storage "$version"; then
            echo "anvil-storage $version is already published; skipping cargo publish"
          else
            cargo publish -p anvil-storage --token "$CARGO_REGISTRY_TOKEN"
          fi

      - name: Render release notes from blog post
        run: |
          scripts/render-release-notes.py \
            --tag "${{ steps.release-tag.outputs.tag }}" \
            --docker-image "${{ steps.docker-push.outputs.image }}" \
            --image-digest "${{ steps.docker-push.outputs.digest }}" \
            --crate-version "anvil-storage $(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="anvil-storage") | .version')" \
            --commit-sha "$(git rev-parse HEAD)" \
            --docs-url "https://${{ github.repository_owner }}.github.io/anvil/" \
            --output release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          body_path: release-notes.md
          make_latest: true
