name: Anvil Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: anvil-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.docs-deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          version: "25.x"

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Fission CLI
        run: |
          if ! command -v fission >/dev/null 2>&1; then
            cargo install cargo-fission --version 0.4.1 --locked
          fi

      - name: Determine release tag
        id: release-tag
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag || '' }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for release gates
        uses: docker/build-push-action@v5
        with:
          context: .
          file: anvil/Dockerfile
          load: true
          push: false
          tags: anvil:test
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Shared release gates
        env:
          ANVIL_IMAGE: anvil:test
        run: ./scripts/release-gates.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/target/fission/site

      - name: Deploy documentation before release publication
        id: docs-deployment
        uses: actions/deploy-pages@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tested Docker image
        id: docker-push
        shell: bash
        run: |
          tag="${{ steps.release-tag.outputs.tag }}"
          image="ghcr.io/${{ github.repository }}:${tag}"
          docker tag anvil:test "$image"
          docker tag anvil:test "ghcr.io/${{ github.repository }}:latest"
          docker push "$image"
          docker push "ghcr.io/${{ github.repository }}:latest"
          digest="$(docker buildx imagetools inspect "$image" --format '{{.Manifest.Digest}}')"
          if [[ -z "$digest" || "$digest" != sha256:* ]]; then
            echo "failed to resolve published image digest for $image" >&2
            exit 1
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Publish Rust client crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is required to publish anvil-storage" >&2
            exit 1
          fi
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="anvil-storage") | .version')"
          if scripts/crate-version-exists.py anvil-storage "$version"; then
            echo "anvil-storage $version is already published; skipping cargo publish"
          else
            cargo publish -p anvil-storage --token "$CARGO_REGISTRY_TOKEN"
          fi

      - name: Render release notes from blog post
        run: |
          scripts/render-release-notes.py \
            --tag "${{ steps.release-tag.outputs.tag }}" \
            --docker-image "${{ steps.docker-push.outputs.image }}" \
            --image-digest "${{ steps.docker-push.outputs.digest }}" \
            --crate-version "anvil-storage $(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="anvil-storage") | .version')" \
            --commit-sha "$GITHUB_SHA" \
            --docs-url "https://${{ github.repository_owner }}.github.io/anvil/" \
            --output release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          body_path: release-notes.md
          make_latest: true
