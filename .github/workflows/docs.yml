name: Anvil Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'documentation/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: anvil-docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: worka-l1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
          documentation/target/
        key: ${{ runner.os }}-docs-cargo-${{ hashFiles('**/Cargo.lock', 'documentation/**') }}

    - name: Install Fission CLI
      run: |
        if ! command -v fission >/dev/null 2>&1; then
          cargo install cargo-fission --version 0.4.1 --locked
        fi

    - name: Check documentation site
      run: fission site check --project-dir documentation --release

    - name: Build documentation site
      run: fission site build --project-dir documentation --release

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload documentation artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: documentation/target/fission/site

  deploy:
    needs: build
    runs-on: worka-l1
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy documentation to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
