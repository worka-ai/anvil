name: Anvil CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    runs-on: worka-l1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: clients/typescript/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # - name: Set up QEMU
    #   uses: docker/setup-qemu-action@v3

    - name: Install Protoc
      uses: arduino/setup-protoc@v2
      with:
        version: "25.x"

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Guard against external relational metadata stores
      run: ./scripts/check-no-external-db.sh

    - name: Guard against public unfenced journal writes
      run: ./scripts/check-no-public-unfenced-journal-writes.sh

    - name: Validate TypeScript client package
      working-directory: clients/typescript
      run: |
        npm ci
        npm test
        npm pack --dry-run

    - name: Validate Python client package
      working-directory: clients/python
      run: |
        python -m pip install --upgrade pip build twine
        python -m build --sdist --wheel
        python -m twine check dist/*
        python -m venv /tmp/anvil-python-client-smoke
        /tmp/anvil-python-client-smoke/bin/python -m pip install dist/*.whl
        /tmp/anvil-python-client-smoke/bin/python -m unittest discover -s tests

    - name: Validate publishable Rust core crate
      run: cargo publish --dry-run -p anvil-storage-core

    - name: Build Release Binaries (Native Linux)
      run: cargo build --release --workspace

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compute test image tag
      id: img
      run: echo "tag=anvil:test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> $GITHUB_OUTPUT

    - name: Build Docker Image for Testing
      uses: docker/build-push-action@v5
      with:
        context: .
        file: anvil/Dockerfile
#        Triggers Error: buildx failed with: ERROR: failed to build: docker exporter does not currently support exporting manifest lists
#        https://github.com/docker/buildx/issues/59
        load: true #When ARM support is re-enabled, this needs to be disabled
        push: false
        tags: anvil:test
#        # platforms: linux/amd64,linux/arm64
        platforms: linux/amd64

    - name: Run All Tests
      env:
        ANVIL_IMAGE: anvil:test
      run: cargo test -- --nocapture

    - name: Run Release-Gated Docker E2E Tests
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        ANVIL_IMAGE: anvil:test
        ANVIL_RUN_DOCKER_E2E: "1"
        ANVIL_RUN_HF_E2E: "1"
      run: cargo test -p anvil-storage --test docker_cluster_test --test hf_ingestion_e2e -- --nocapture --test-threads=1

    # --- Release Steps ---
    # These steps will only run on a successful push to the main branch.

    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate release tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: tag
      run: echo "tag_name=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Extract metadata for Docker
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=${{ steps.tag.outputs.tag_name }}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and Push Final Docker Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: anvil/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # platforms: linux/amd64,linux/arm64
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Prepare Release Assets
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p release
        image_ref="$(echo '${{ steps.meta.outputs.tags }}' | head -n1)"
        container_id="$(docker create "$image_ref")"
        trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
        docker cp "$container_id":/usr/local/bin/anvil release/anvil-server
        docker cp "$container_id":/usr/local/bin/anvil-cli release/anvil-cli
        docker cp "$container_id":/usr/local/bin/admin release/anvil-admin

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        generate_release_notes: true
        body: |
          ## Docker Image

          You can pull the latest image using the following command:

          ```sh
          docker pull ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag_name }}
          ```
        files: |
          release/anvil-server
          release/anvil-cli
          release/anvil-admin
