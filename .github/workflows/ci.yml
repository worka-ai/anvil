name: Anvil CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-image:
    name: Build Anvil image (${{ matrix.platform }})
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            image: anvil:test-amd64
            artifact: anvil-test-image-amd64
          - platform: linux/arm64
            arch: arm64
            image: anvil:test-arm64
            artifact: anvil-test-image-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            protobuf-compiler

      - name: Set up QEMU for cross-architecture image smoke checks
        uses: docker/setup-qemu-action@v3

      - name: Install Zig for release-shaped Rust builds
        uses: mlugg/setup-zig@v2

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.arch }}-
            ${{ runner.os }}-cargo-

      - name: Install cargo-zigbuild for release-shaped Rust builds
        run: |
          if ! command -v cargo-zigbuild >/dev/null 2>&1; then
            cargo install cargo-zigbuild --locked
          fi

      - name: Build Docker image from host-built binaries
        env:
          ANVIL_IMAGE: ${{ matrix.image }}
          ANVIL_DOCKER_PLATFORM: ${{ matrix.platform }}
        run: ./scripts/build-image.sh

      - name: Smoke check image binaries
        run: |
          timeout 30s docker run --platform ${{ matrix.platform }} --rm ${{ matrix.image }} anvil-server --version
          timeout 30s docker run --platform ${{ matrix.platform }} --rm ${{ matrix.image }} anvil --version
          timeout 30s docker run --platform ${{ matrix.platform }} --rm ${{ matrix.image }} anvil-admin --version

      - name: Export Docker image artifact
        run: docker save ${{ matrix.image }} -o /tmp/${{ matrix.artifact }}.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/${{ matrix.artifact }}.tar
          compression-level: 0
          retention-days: 1

  static:
    name: Static, docs, and packaging gates
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Fission CLI
        run: |
          if ! command -v fission >/dev/null 2>&1; then
            cargo install cargo-fission --version 0.4.1 --locked
          fi

      - name: Run static release gates
        run: ./scripts/release-gates.sh static

  rust-unit:
    name: Rust unit and client tests
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust unit release gates
        run: ./scripts/release-gates.sh rust

  server-core:
    name: Server core integration tests
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run server core integration gates
        run: ./scripts/release-gates.sh server-core

  docker-integration:
    name: Docker integration tests (${{ matrix.group }})
    needs: build-image
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        group: [docker-auth, docker-storage, docker-index, docker-mesh]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Download amd64 Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: anvil-test-image-amd64
          path: /tmp/anvil-image-amd64

      - name: Load amd64 Docker image
        run: docker load -i /tmp/anvil-image-amd64/anvil-test-image-amd64.tar

      - name: Run Docker integration release gates
        env:
          ANVIL_IMAGE: anvil:test-amd64
          ANVIL_DOCKER_TEST_PROJECT: anvil-ci-${{ matrix.group }}-${{ github.run_id }}-${{ github.run_attempt }}
          ANVIL_GATE_STEP_TIMEOUT_SECONDS: "5400"
        run: ./scripts/release-gates.sh ${{ matrix.group }}
