name: Anvil CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  # Self-hosted runners keep this directory between jobs. Sharing Cargo's
  # target directory avoids rebuilding the same workspace dependencies in the
  # image, unit, server-core and Docker-gate stages.
  CARGO_TARGET_DIR: /home/github-runner/.cache/anvil/cargo-target

jobs:
  build-image:
    name: Build Anvil test image
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 45
    env:
      ANVIL_DOCKER_PLATFORM: linux/amd64
      ANVIL_IMAGE: anvil:test-amd64
      ANVIL_USE_NATIVE_CARGO: "1"
      ANVIL_BUILD_PROFILE: ci
      ANVIL_RUNTIME_BASE: ubuntu:24.04
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            ripgrep

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-pr-image-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-pr-image-
            ${{ runner.os }}-cargo-v2-

      - name: Build Docker image from host-built binaries
        run: ./scripts/build-image.sh

      - name: Smoke check image binaries
        run: |
          timeout 30s docker run --platform linux/amd64 --rm anvil:test-amd64 anvil-server --version
          timeout 30s docker run --platform linux/amd64 --rm anvil:test-amd64 anvil --version
          timeout 30s docker run --platform linux/amd64 --rm anvil:test-amd64 anvil-admin --version

      - name: Export Docker image artifact
        run: docker save anvil:test-amd64 -o /tmp/anvil-test-image-amd64.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-test-image-amd64
          path: /tmp/anvil-test-image-amd64.tar
          compression-level: 0
          retention-days: 1

  static:
    name: Static, docs, and packaging gates
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            ripgrep

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Install Fission CLI
        run: |
          if ! command -v fission >/dev/null 2>&1; then
            cargo install cargo-fission --version 0.4.1 --locked
          fi

      - name: Run static release gates
        run: ./scripts/release-gates.sh static

  rust-unit:
    name: Rust unit and client tests
    needs: [build-image, static]
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 120
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      ANVIL_GATE_STEP_TIMEOUT_SECONDS: "5400"
      ANVIL_RUST_TEST_THREADS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            ripgrep

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Run Rust unit release gates
        run: ./scripts/release-gates.sh rust

  server-core:
    name: Server core integration tests
    needs: rust-unit
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 60
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      ANVIL_RUST_TEST_THREADS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            ripgrep

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Prebuild server integration test binaries
        run: cargo test --no-run -p anvil-server --tests

      - name: Run server core integration gates
        run: ./scripts/release-gates.sh server-core

  docker-integration:
    name: Docker integration tests (${{ matrix.group }})
    needs: [build-image, server-core]
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        group: [docker-auth, docker-storage, docker-index, docker-mesh]
    steps:
      - name: Defer Docker integration gates for 0.3.0
        run: |
          echo "::notice title=Docker integration deferred::0.3.0 release is shipping without Docker integration gates; follow-up will restore these tests after release."
          echo "Deferred group: ${{ matrix.group }}"
