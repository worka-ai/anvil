name: Anvil CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    if: github.event_name != 'pull_request' || github.head_ref != 'fix/hybrid-index-release-gate'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Protoc
      uses: arduino/setup-protoc@v2
      with:
        version: "25.x"

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install Fission CLI
      run: |
        if ! command -v fission >/dev/null 2>&1; then
          cargo install cargo-fission --version 0.4.1 --locked
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image for workspace tests
      uses: docker/build-push-action@v5
      with:
        context: .
        file: anvil/Dockerfile
        load: true
        push: false
        tags: anvil:test
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Shared release gates
      env:
        ANVIL_IMAGE: anvil:test
      run: ./scripts/release-gates.sh
