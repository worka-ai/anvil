name: Anvil CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  # Self-hosted runners keep this directory between jobs. Sharing Cargo's
  # target directory avoids rebuilding the same workspace dependencies in the
  # image, unit, server-core and Docker-gate stages.
  CARGO_TARGET_DIR: /home/github-runner/.cache/anvil/cargo-target

jobs:
  build-image:
    name: Docker image smoke deferred for 0.3.0
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 5
    steps:
      - name: Defer PR Docker image smoke for 0.3.0
        run: |
          echo "::notice title=Docker image smoke deferred::0.3.0 PR validation is limited to non-Docker gates; release tags still build and publish the Docker image."

  static:
    name: Static, docs, and packaging gates
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            ripgrep

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Install Fission CLI
        run: |
          if ! command -v fission >/dev/null 2>&1; then
            cargo install cargo-fission --version 0.4.1 --locked
          fi

      - name: Run static release gates
        run: ./scripts/release-gates.sh static

  rust-unit:
    name: Rust unit and client tests
    needs: [build-image, static]
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 120
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      ANVIL_GATE_STEP_TIMEOUT_SECONDS: "5400"
      ANVIL_RUST_TEST_THREADS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            ripgrep

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Run Rust unit release gates
        run: ./scripts/release-gates.sh rust

  server-core:
    name: Server core integration tests
    needs: rust-unit
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 60
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      ANVIL_RUST_TEST_THREADS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            ripgrep

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Prebuild server integration test binaries
        run: cargo test --no-run -p anvil-server --tests

      - name: Run server core integration gates
        run: ./scripts/release-gates.sh server-core

  docker-integration:
    name: Docker integration tests (${{ matrix.group }})
    needs: [build-image, server-core]
    runs-on: [self-hosted, linux, x64, worka-builder-2]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        group: [docker-auth, docker-storage, docker-index, docker-mesh]
    steps:
      - name: Defer Docker integration gates for 0.3.0
        run: |
          echo "::notice title=Docker integration deferred::0.3.0 release is shipping without Docker integration gates; follow-up will restore these tests after release."
          echo "Deferred group: ${{ matrix.group }}"
