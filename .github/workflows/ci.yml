name: Anvil CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-image:
    name: Build Anvil test image
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    env:
      ANVIL_DOCKER_PLATFORM: linux/amd64
      ANVIL_IMAGE: anvil:test-amd64
      ANVIL_USE_NATIVE_CARGO: "1"
      ANVIL_BUILD_PROFILE: dev
      ANVIL_RUNTIME_BASE: ubuntu:24.04
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-pr-image-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-pr-image-
            ${{ runner.os }}-cargo-v2-

      - name: Build Docker image from host-built binaries
        run: ./scripts/build-image.sh

      - name: Smoke check image binaries
        run: |
          timeout 30s docker run --platform linux/amd64 --rm anvil:test-amd64 anvil-server --version
          timeout 30s docker run --platform linux/amd64 --rm anvil:test-amd64 anvil --version
          timeout 30s docker run --platform linux/amd64 --rm anvil:test-amd64 anvil-admin --version

      - name: Export Docker image artifact
        run: docker save anvil:test-amd64 -o /tmp/anvil-test-image-amd64.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-test-image-amd64
          path: /tmp/anvil-test-image-amd64.tar
          compression-level: 0
          retention-days: 1

  static:
    name: Static, docs, and packaging gates
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Install Fission CLI
        run: |
          if ! command -v fission >/dev/null 2>&1; then
            cargo install cargo-fission --version 0.4.1 --locked
          fi

      - name: Run static release gates
        run: ./scripts/release-gates.sh static

  rust-unit:
    name: Rust unit and client tests
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Run Rust unit release gates
        run: ./scripts/release-gates.sh rust

  server-core:
    name: Server core integration tests
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Run server core integration gates
        run: ./scripts/release-gates.sh server-core

  docker-integration:
    name: Docker integration tests (${{ matrix.group }})
    needs: build-image
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        group: [docker-auth, docker-storage, docker-index, docker-mesh]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Download amd64 Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: anvil-test-image-amd64
          path: /tmp/anvil-image-amd64

      - name: Load amd64 Docker image
        run: docker load -i /tmp/anvil-image-amd64/anvil-test-image-amd64.tar

      - name: Run Docker integration release gates
        env:
          ANVIL_IMAGE: anvil:test-amd64
          ANVIL_DOCKER_TEST_PROJECT: anvil-ci-${{ matrix.group }}-${{ github.run_id }}-${{ github.run_attempt }}
          ANVIL_GATE_STEP_TIMEOUT_SECONDS: "5400"
        run: ./scripts/release-gates.sh ${{ matrix.group }}
