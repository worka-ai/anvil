name: Anvil CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Protoc
      uses: arduino/setup-protoc@v2
      with:
        version: "25.x"

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Guard against external relational metadata stores
      run: ./scripts/check-no-external-db.sh

    - name: Guard against public unfenced journal writes
      run: ./scripts/check-no-public-unfenced-journal-writes.sh

    - name: Validate publishable Rust client crate
      run: cargo publish --dry-run -p anvil-storage

    - name: Run All Tests
      run: cargo test --workspace -- --nocapture

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image for Testing
      uses: docker/build-push-action@v5
      with:
        context: .
        file: anvil/Dockerfile
        load: true
        push: false
        tags: anvil:test
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Release-Gated Docker E2E Tests
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        ANVIL_IMAGE: anvil:test
        ANVIL_RUN_DOCKER_E2E: "1"
        ANVIL_RUN_HF_E2E: "1"
      run: cargo test -p anvil-server --test docker_cluster_test --test hf_ingestion_e2e -- --nocapture --test-threads=1

    # --- Docker publication ---
    # Main branch pushes publish the server image. GitHub releases are created
    # separately after docs and the Rust client crate are published.

    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate image tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: tag
      run: echo "tag_name=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Push Tested Docker Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag anvil:test ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag_name }}
        docker tag anvil:test ghcr.io/${{ github.repository }}:latest
        docker push ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag_name }}
        docker push ghcr.io/${{ github.repository }}:latest
