syntax = "proto3";

package anvil;

service AdminService {
  rpc CreateTenant(CreateTenantRequest) returns (TenantAdminResponse);
  rpc CreateApplication(CreateApplicationRequest) returns (ApplicationSecretResponse);
  rpc RotateApplicationSecret(RotateApplicationSecretRequest) returns (ApplicationSecretResponse);
  rpc GrantApplicationPolicy(GrantApplicationPolicyRequest) returns (ApplicationPolicyResponse);
  rpc RevokeApplicationPolicy(RevokeApplicationPolicyRequest) returns (ApplicationPolicyResponse);
  rpc GrantApplicationPolicies(ApplicationPoliciesRequest) returns (ApplicationPoliciesResponse);
  rpc RevokeApplicationPolicies(ApplicationPoliciesRequest) returns (ApplicationPoliciesResponse);
  rpc RotateSecretEncryptionKey(RotateSecretEncryptionKeyRequest) returns (SecretEncryptionKeyRotationResponse);
  rpc CreateBucketAdmin(CreateBucketAdminRequest) returns (BucketAdminResponse);
  rpc SetBucketPublicAccessAdmin(SetBucketPublicAccessAdminRequest) returns (BucketAdminResponse);


  rpc CreateHostAlias(CreateHostAliasAdminRequest) returns (HostAliasResponse);
  rpc ActivateHostAlias(ActivateHostAliasRequest) returns (HostAliasResponse);
  rpc SuspendHostAlias(SuspendHostAliasRequest) returns (HostAliasResponse);
  rpc DeleteHostAlias(DeleteHostAliasAdminRequest) returns (AdminMutationResponse);
  rpc ReadHostAlias(ReadHostAliasRequest) returns (HostAliasResponse);
  rpc ListHostAliases(ListHostAliasesRequest) returns (ListHostAliasesResponse);

  rpc CreateRegion(CreateRegionRequest) returns (RegionResponse);
  rpc ActivateRegion(ActivateRegionRequest) returns (RegionResponse);
  rpc SetRegionReadOnly(SetRegionReadOnlyRequest) returns (RegionResponse);
  rpc DrainRegion(DrainRegionRequest) returns (DrainOperationResponse);
  rpc RemoveRegion(RemoveRegionRequest) returns (AdminMutationResponse);
  rpc ListRegions(ListRegionsRequest) returns (ListRegionsResponse);

  rpc RegisterCell(RegisterCellRequest) returns (CellResponse);
  rpc ActivateCell(ActivateCellRequest) returns (CellResponse);
  rpc DrainCell(DrainCellRequest) returns (DrainOperationResponse);
  rpc RemoveCell(RemoveCellRequest) returns (AdminMutationResponse);
  rpc ListCells(ListCellsRequest) returns (ListCellsResponse);

  rpc RegisterNode(RegisterNodeRequest) returns (NodeResponse);
  rpc GetLocalNodeDescriptor(GetLocalNodeDescriptorRequest) returns (NodeResponse);
  rpc ActivateNode(ActivateNodeRequest) returns (NodeResponse);
  rpc DrainNode(DrainNodeRequest) returns (DrainOperationResponse);
  rpc ForceOfflineNode(ForceOfflineNodeRequest) returns (NodeResponse);
  rpc RemoveNode(RemoveNodeRequest) returns (AdminMutationResponse);
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);

  rpc ListRoutingRecords(ListRoutingRecordsRequest) returns (ListRoutingRecordsResponse);
  rpc RepairRoutingRecord(RepairRoutingRecordRequest) returns (AdminMutationResponse);

  rpc RunRepair(RunRepairRequest) returns (RepairTaskResponse);
  rpc ListDiagnostics(ListDiagnosticsRequest) returns (DiagnosticsResponse);
  rpc ListAuditEvents(ListAuditEventsRequest) returns (AuditEventsResponse);
  rpc ListStorageClasses(ListStorageClassesRequest) returns (ListStorageClassesResponse);
  rpc GetStorageClass(GetStorageClassRequest) returns (StorageClassResponse);
}

message AdminRequestContext {
  string request_id = 1;
  string idempotency_key = 2;
  string audit_reason = 3;
  uint64 expected_generation = 4;
}

message PublicMutationContext {
  string request_id = 1;
  string idempotency_key = 2;
  uint64 expected_generation = 3;
  optional string transaction_id = 4;
  optional SagaOperationContext saga_operation = 5;
  optional SagaCompensationOperationContext saga_compensation_operation = 6;
}

message AdminPrincipal {
  string principal_id = 1;
  string tenant_id = 2;
  repeated string authenticated_methods = 3;
}

message AdminMutationResponse {
  string request_id = 1;
  string resource_id = 2;
  uint64 generation = 3;
  string audit_event_id = 4;
  bool idempotent_replay = 5;
}

message MutationResponse {
  string request_id = 1;
  string resource_id = 2;
  uint64 generation = 3;
  string audit_event_id = 4;
  bool idempotent_replay = 5;
}

message AdminError {
  string request_id = 1;
  string code = 2;
  string message = 3;
  string resource_id = 4;
  uint64 current_generation = 5;
}

message PageRequest {
  string cursor = 1;
  uint32 limit = 2;
}

message PageResponse {
  string next_cursor = 1;
  bool has_more = 2;
}

message StorageClassDescriptor {
  string class_id = 1;
  string description = 2;
  string metadata_profile_id = 3;
  uint32 metadata_replica_count = 4;
  uint32 metadata_prepare_quorum = 5;
  uint32 metadata_certificate_persist_quorum = 6;
  string metadata_fsync_mode = 7;
  string byte_profile_id = 8;
  string byte_codec_id = 9;
  uint32 data_shards = 10;
  uint32 parity_shards = 11;
  uint32 read_quorum = 12;
  uint32 write_publish_threshold = 13;
  uint64 target_block_bytes = 14;
  uint64 max_shard_bytes = 15;
  string compression = 16;
  string encryption = 17;
  bool inline_payload_enabled = 18;
  uint32 max_inline_payload_bytes = 19;
  uint32 absolute_inline_record_max_bytes = 20;
  uint32 min_cell_spread = 21;
  bool tenant_selectable = 22;
  bool is_default = 23;
}

message ListStorageClassesRequest {
  string request_id = 1;
  bool include_operator_only = 2;
}

message ListStorageClassesResponse {
  string request_id = 1;
  repeated StorageClassDescriptor storage_classes = 2;
  string default_class_id = 3;
}

message GetStorageClassRequest {
  string request_id = 1;
  string class_id = 2;
}

message StorageClassResponse {
  string request_id = 1;
  StorageClassDescriptor storage_class = 2;
}

enum NodeCapability {
  NODE_CAPABILITY_UNSPECIFIED = 0;
  NODE_CAPABILITY_OBJECT = 1;
  NODE_CAPABILITY_INDEX = 2;
  NODE_CAPABILITY_PERSONALDB = 3;
  NODE_CAPABILITY_METADATA = 4;
  NODE_CAPABILITY_GATEWAY = 5;
  NODE_CAPABILITY_ADMIN = 6;
}

enum ObjectLinkResolution {
  OBJECT_LINK_RESOLUTION_UNSPECIFIED = 0;
  OBJECT_LINK_RESOLUTION_FOLLOW = 1;
  OBJECT_LINK_RESOLUTION_REDIRECT = 2;
}

enum RegionDrainDisposition {
  REGION_DRAIN_DISPOSITION_UNSPECIFIED = 0;
  REGION_DRAIN_DISPOSITION_BLOCK_UNTIL_EMPTY = 1;
  REGION_DRAIN_DISPOSITION_REMAIN_PROXY_ONLY = 2;
  REGION_DRAIN_DISPOSITION_READ_ONLY_UNTIL_REMOVED = 3;
  REGION_DRAIN_DISPOSITION_DELETE_AFTER_RETENTION = 4;
}

enum LifecycleState {
  LIFECYCLE_STATE_UNSPECIFIED = 0;
  LIFECYCLE_STATE_JOINING = 1;
  LIFECYCLE_STATE_ACTIVE = 2;
  LIFECYCLE_STATE_READ_ONLY = 3;
  LIFECYCLE_STATE_DRAINING = 4;
  LIFECYCLE_STATE_DRAINED = 5;
  LIFECYCLE_STATE_DRAINED_WITH_EXCEPTIONS = 6;
  LIFECYCLE_STATE_OFFLINE = 7;
  LIFECYCLE_STATE_REMOVED = 8;
}

enum HostAliasState {
  HOST_ALIAS_STATE_UNSPECIFIED = 0;
  HOST_ALIAS_STATE_PENDING_VERIFICATION = 1;
  HOST_ALIAS_STATE_ACTIVE = 2;
  HOST_ALIAS_STATE_SUSPENDED = 3;
  HOST_ALIAS_STATE_DELETED = 4;
}

enum RoutingRecordFamily {
  ROUTING_RECORD_FAMILY_UNSPECIFIED = 0;
  ROUTING_RECORD_FAMILY_TENANT_NAME = 1;
  ROUTING_RECORD_FAMILY_TENANT_LOCATOR = 2;
  ROUTING_RECORD_FAMILY_BUCKET_LOCATOR = 3;
  ROUTING_RECORD_FAMILY_HOST_ALIAS = 4;
}

enum RepairKind {
  REPAIR_KIND_UNSPECIFIED = 0;
  REPAIR_KIND_INDEX = 1;
  REPAIR_KIND_DIRECTORY_INDEX = 2;
  REPAIR_KIND_AUTHZ_DERIVED_INDEX = 3;
  REPAIR_KIND_PERSONALDB_LOG_CHAIN = 4;
  REPAIR_KIND_MESH_ROUTING_PROJECTION = 5;
}

message NodeDrainDescriptor {
  string started_at = 1;
  uint64 graceful_timeout_ms = 2;
  bool force_after_timeout = 3;
}

message NodeDescriptor {
  string schema = 1;
  string mesh_id = 2;
  string node_id = 3;
  string region = 4;
  string cell_id = 5;
  string libp2p_peer_id = 6;
  string public_api_addr = 7;
  bytes receipt_signing_public_key_proto = 16;
  repeated string public_cluster_addrs = 8;
  repeated NodeCapability capabilities = 9;
  LifecycleState state = 10;
  NodeDrainDescriptor drain = 11;
  string last_heartbeat_at = 12;
  string created_at = 13;
  string updated_at = 14;
  uint64 generation = 15;
  string capacity_json_hash = 17;
}

message RegionDescriptor {
  string schema = 1;
  string mesh_id = 2;
  string region = 3;
  LifecycleState state = 4;
  string public_base_url = 5;
  string virtual_host_suffix = 6;
  uint32 placement_weight = 7;
  string default_cell = 8;
  string created_at = 9;
  string updated_at = 10;
  uint64 generation = 11;
}

message CellDescriptor {
  string schema = 1;
  string mesh_id = 2;
  string region = 3;
  string cell_id = 4;
  LifecycleState state = 5;
  uint32 placement_weight = 6;
  string created_at = 7;
  string updated_at = 8;
  uint64 generation = 9;
  string failure_domain = 10;
}

message ObjectLinkDescriptor {
  string schema = 1;
  string tenant_id = 2;
  string bucket_name = 3;
  string link_key = 4;
  string target_key = 5;
  string target_version = 6;
  ObjectLinkResolution resolution = 7;
  string created_at = 8;
  string updated_at = 9;
  string created_by = 10;
  uint64 generation = 11;
}

message HostAliasDescriptor {
  string schema = 1;
  string hostname = 2;
  string tenant_id = 3;
  string bucket_name = 4;
  string region = 5;
  string prefix = 6;
  HostAliasState state = 7;
  string created_at = 8;
  string updated_at = 9;
  uint64 generation = 10;
  string verification_challenge = 11;
}

message TenantAdminDescriptor {
  string tenant_id = 1;
  string name = 2;
  string home_region = 3;
}

message CreateTenantRequest {
  AdminRequestContext context = 1;
  string name = 2;
  string home_region = 3;
}

message TenantAdminResponse {
  string request_id = 1;
  TenantAdminDescriptor tenant = 2;
  string audit_event_id = 3;
}

message CreateApplicationRequest {
  AdminRequestContext context = 1;
  string tenant_id = 2;
  string app_name = 3;
}

message RotateApplicationSecretRequest {
  AdminRequestContext context = 1;
  string tenant_id = 2;
  string app_name = 3;
}

message ApplicationSecretResponse {
  string request_id = 1;
  string tenant_id = 2;
  string app_name = 3;
  string client_id = 4;
  string client_secret = 5;
  string audit_event_id = 6;
  string app_id = 7;
}

message GrantApplicationPolicyRequest {
  AdminRequestContext context = 1;
  string tenant_id = 2;
  string app_name = 3;
  string action = 4;
  string resource = 5;
}

message RevokeApplicationPolicyRequest {
  AdminRequestContext context = 1;
  string tenant_id = 2;
  string app_name = 3;
  string action = 4;
  string resource = 5;
}

message ApplicationPolicyResponse {
  string request_id = 1;
  string tenant_id = 2;
  string app_name = 3;
  string action = 4;
  string resource = 5;
  string audit_event_id = 6;
}

message ApplicationPolicyMutation {
  string action = 1;
  string resource = 2;
}

message ApplicationPoliciesRequest {
  AdminRequestContext context = 1;
  string tenant_id = 2;
  string app_name = 3;
  repeated ApplicationPolicyMutation policies = 4;
}

message ApplicationPoliciesResponse {
  string request_id = 1;
  string tenant_id = 2;
  string app_name = 3;
  repeated ApplicationPolicyMutation policies = 4;
  string audit_event_id = 5;
}

message RotateSecretEncryptionKeyRequest {
  AdminRequestContext context = 1;
  bool dry_run = 2;
}

message SecretEncryptionKeyRotationResponse {
  string request_id = 1;
  string active_key_id = 2;
  bool dry_run = 3;
  uint64 app_secrets_examined = 4;
  uint64 app_secrets_rotated = 5;
  uint64 hf_keys_examined = 6;
  uint64 hf_keys_rotated = 7;
  uint64 already_active = 10;
  string audit_event_id = 11;
}

message CreateBucketAdminRequest {
  AdminRequestContext context = 1;
  string tenant_id = 2;
  string bucket_name = 3;
  string region = 4;
}

message SetBucketPublicAccessAdminRequest {
  AdminRequestContext context = 1;
  string tenant_id = 2;
  string bucket_name = 3;
  bool allow_public_read = 4;
}

message BucketAdminResponse {
  string request_id = 1;
  Bucket bucket = 2;
  string audit_event_id = 3;
}

message CreateObjectLinkRequest {
  PublicMutationContext context = 1;
  string tenant_id = 2;
  string bucket_name = 3;
  string link_key = 4;
  string target_key = 5;
  string target_version = 6;
  ObjectLinkResolution resolution = 7;
  bool allow_dangling = 8;
}

message UpdateObjectLinkRequest {
  PublicMutationContext context = 1;
  string tenant_id = 2;
  string bucket_name = 3;
  string link_key = 4;
  string target_key = 5;
  string target_version = 6;
  ObjectLinkResolution resolution = 7;
  bool allow_dangling = 8;
}

message DeleteObjectLinkRequest {
  PublicMutationContext context = 1;
  string tenant_id = 2;
  string bucket_name = 3;
  string link_key = 4;
}

message ReadObjectLinkRequest {
  string request_id = 1;
  string tenant_id = 2;
  string bucket_name = 3;
  string link_key = 4;
  ReadConsistency consistency = 5;
}

message ListObjectLinksRequest {
  string tenant_id = 1;
  string bucket_name = 2;
  string prefix = 3;
  PageRequest page = 4;
  ReadConsistency consistency = 5;
}

message CreateHostAliasAdminRequest {
  AdminRequestContext context = 1;
  string hostname = 2;
  string tenant_id = 3;
  string bucket_name = 4;
  string region = 5;
  string prefix = 6;
}

message CreateHostAliasRequest {
  PublicMutationContext context = 1;
  string hostname = 2;
  string tenant_id = 3;
  string bucket_name = 4;
  string region = 5;
  string prefix = 6;
}

message VerifyHostAliasRequest {
  PublicMutationContext context = 1;
  string hostname = 2;
  string observed_challenge = 3;
}

message ActivateHostAliasRequest {
  AdminRequestContext context = 1;
  string hostname = 2;
}

message SuspendHostAliasRequest {
  AdminRequestContext context = 1;
  string hostname = 2;
}

message DeleteHostAliasRequest {
  PublicMutationContext context = 1;
  string hostname = 2;
}

message DeleteHostAliasAdminRequest {
  AdminRequestContext context = 1;
  string hostname = 2;
}

message ReadHostAliasRequest {
  string request_id = 1;
  string hostname = 2;
}

message ListHostAliasesRequest {
  string region = 1;
  PageRequest page = 2;
}

message ObjectLinkResponse {
  string request_id = 1;
  ObjectLinkDescriptor link = 2;
  string audit_event_id = 3;
}

message ListObjectLinksResponse {
  PageResponse page = 1;
  repeated ObjectLinkDescriptor links = 2;
}

message HostAliasResponse {
  string request_id = 1;
  HostAliasDescriptor host_alias = 2;
  string audit_event_id = 3;
}

message ListHostAliasesResponse {
  PageResponse page = 1;
  repeated HostAliasDescriptor host_aliases = 2;
}

message BucketDrainOverride {
  string tenant_id = 1;
  string bucket_name = 2;
  RegionDrainDisposition disposition = 3;
  string reason = 4;
  string expires_at = 5;
}

message DrainOperationResponse {
  string request_id = 1;
  string resource_id = 2;
  LifecycleState state = 3;
  uint64 generation = 4;
  string audit_event_id = 5;
}

message CreateRegionRequest {
  AdminRequestContext context = 1;
  string region = 2;
  string public_base_url = 3;
  string virtual_host_suffix = 4;
  uint32 placement_weight = 5;
  string default_cell = 6;
}

message ActivateRegionRequest {
  AdminRequestContext context = 1;
  string region = 2;
  string activation_checkpoint_json = 3;
}

message SetRegionReadOnlyRequest {
  AdminRequestContext context = 1;
  string region = 2;
}

message DrainRegionRequest {
  AdminRequestContext context = 1;
  string region = 2;
  RegionDrainDisposition default_disposition = 3;
  repeated BucketDrainOverride bucket_overrides = 4;
}

message RemoveRegionRequest {
  AdminRequestContext context = 1;
  string region = 2;
}

message ListRegionsRequest {
  PageRequest page = 1;
}

message RegisterCellRequest {
  AdminRequestContext context = 1;
  string region = 2;
  string cell_id = 3;
  uint32 placement_weight = 4;
  string failure_domain = 5;
}

message ActivateCellRequest {
  AdminRequestContext context = 1;
  string region = 2;
  string cell_id = 3;
}

message DrainCellRequest {
  AdminRequestContext context = 1;
  string region = 2;
  string cell_id = 3;
}

message RemoveCellRequest {
  AdminRequestContext context = 1;
  string region = 2;
  string cell_id = 3;
}

message ListCellsRequest {
  string region = 1;
  PageRequest page = 2;
}

message RegisterNodeRequest {
  AdminRequestContext context = 1;
  string node_id = 2;
  string region = 3;
  string cell_id = 4;
  string libp2p_peer_id = 5;
  repeated string public_cluster_addrs = 6;
  string public_api_addr = 7;
  repeated NodeCapability capabilities = 8;
  bytes receipt_signing_public_key_proto = 9;
  string capacity_json = 10;
}

message GetLocalNodeDescriptorRequest {}

message ActivateNodeRequest {
  AdminRequestContext context = 1;
  string node_id = 2;
}

message DrainNodeRequest {
  AdminRequestContext context = 1;
  string node_id = 2;
  uint64 graceful_timeout_ms = 3;
  bool force_after_timeout = 4;
}

message ForceOfflineNodeRequest {
  AdminRequestContext context = 1;
  string node_id = 2;
}

message RemoveNodeRequest {
  AdminRequestContext context = 1;
  string node_id = 2;
}

message ListNodesRequest {
  string region = 1;
  string cell_id = 2;
  PageRequest page = 3;
}

message NodeResponse {
  string request_id = 1;
  NodeDescriptor node = 2;
  string audit_event_id = 3;
}

message RegionResponse {
  string request_id = 1;
  RegionDescriptor region = 2;
  string audit_event_id = 3;
}

message CellResponse {
  string request_id = 1;
  CellDescriptor cell = 2;
  string audit_event_id = 3;
}

message ListNodesResponse {
  PageResponse page = 1;
  repeated NodeDescriptor nodes = 2;
}

message ListRegionsResponse {
  PageResponse page = 1;
  repeated RegionDescriptor regions = 2;
}

message ListCellsResponse {
  PageResponse page = 1;
  repeated CellDescriptor cells = 2;
}

message RoutingRecordDescriptor {
  RoutingRecordFamily family = 1;
  string record_key = 2;
  string partition = 3;
  string descriptor_key = 4;
  uint64 generation = 5;
  string payload_json = 6;
}

message ListRoutingRecordsRequest {
  RoutingRecordFamily family = 1;
  PageRequest page = 2;
}

message ListRoutingRecordsResponse {
  PageResponse page = 1;
  repeated RoutingRecordDescriptor records = 2;
}

message RepairRoutingRecordRequest {
  AdminRequestContext context = 1;
  RoutingRecordFamily family = 2;
  string record_key = 3;
}

message RunRepairRequest {
  AdminRequestContext context = 1;
  RepairKind repair_kind = 2;
  string tenant_id = 3;
  string bucket_name = 4;
  string index_name = 5;
  string derived_index_id = 6;
  string database_id = 7;
  bool rebuild = 8;
}

message RepairTaskResponse {
  string request_id = 1;
  string repair_task_id = 2;
  string status = 3;
  string scope_kind = 4;
  string scope_id = 5;
  repeated RepairFindingRecord findings = 6;
  string audit_event_id = 7;
  string details_json = 8;
}

message ListDiagnosticsRequest {
  string request_id = 1;
  string source = 2;
  string tenant_id = 3;
  string bucket_name = 4;
  string index_name = 5;
  string severity = 6;
  PageRequest page = 7;
}

message DiagnosticRecord {
  string diagnostic_id = 1;
  string scope_kind = 2;
  string scope_id = 3;
  string source = 4;
  string severity = 5;
  string code = 6;
  string message = 7;
  string object_key = 8;
  string version_id = 9;
  string details_json = 10;
  int64 created_at_nanos = 11;
  uint64 cursor = 12;
}

message DiagnosticsResponse {
  string request_id = 1;
  PageResponse page = 2;
  repeated DiagnosticRecord diagnostics = 3;
  string data_source = 4;
}

message ListAuditEventsRequest {
  string request_id = 1;
  string principal_id = 2;
  string resource_id = 3;
  string action = 4;
  PageRequest page = 5;
}

message AuditEventRecord {
  string audit_event_id = 1;
  string request_id = 2;
  string principal_id = 3;
  string resource_id = 4;
  string action = 5;
  string audit_reason = 6;
  string created_at = 7;
  string details_json = 8;
}

message AuditEventsResponse {
  string request_id = 1;
  PageResponse page = 2;
  repeated AuditEventRecord events = 3;
  string data_source = 4;
}

// Bucket Service
service BucketService {
  rpc CreateBucket(CreateBucketRequest) returns (CreateBucketResponse);
  rpc DeleteBucket(DeleteBucketRequest) returns (DeleteBucketResponse);
  rpc ListBuckets(ListBucketsRequest) returns (ListBucketsResponse);
  rpc GetBucketPolicy(GetBucketPolicyRequest) returns (GetBucketPolicyResponse);
  rpc PutBucketPolicy(PutBucketPolicyRequest) returns (PutBucketPolicyResponse);
  rpc WatchBucketMetadata(WatchBucketMetadataRequest) returns (stream WatchBucketMetadataResponse);
}

message CreateBucketRequest {
  string bucket_name = 1;
  string region = 2;
  WriteOptions options = 3;
}

message CreateBucketResponse {
  int64 bucket_id = 1;
}

message DeleteBucketRequest {
  string bucket_name = 1;
  WriteOptions options = 2;
}

message DeleteBucketResponse {}

message ListBucketsRequest {}

message Bucket {
    string name = 1;
    string creation_date = 2;
    string region = 3;
    bool is_public_read = 4;
    bool deleted = 5;
    int64 bucket_id = 6;
}

message ListBucketsResponse {
    repeated Bucket buckets = 1;
}

message GetBucketPolicyRequest {
    string bucket_name = 1;
}

message GetBucketPolicyResponse {
    string policy_json = 1;
}

message PutBucketPolicyRequest {
    string bucket_name = 1;
    string policy_json = 2;
    WriteOptions options = 3;
}

message PutBucketPolicyResponse {}

message WatchBucketMetadataRequest {
    string bucket_name = 1;
    uint64 after_cursor = 2;
}

message WatchBucketMetadataResponse {
    uint64 cursor = 1;
    string event_type = 2;
    Bucket bucket = 3;
    string emitted_at = 4;
    WatchEventEnvelope envelope = 20;
}

message WatchEventEnvelope {
    string watch_stream_id = 1;
    string partition_family = 2;
    string partition_id = 3;
    uint64 cursor_low = 4;
    uint64 cursor_high = 5;
    string mutation_id = 6;
    string record_kind = 7;
    string object_ref = 8;
    uint64 authz_revision = 9;
    uint64 index_generation = 10;
    uint64 personaldb_log_index = 11;
    string payload_hash = 12;
    string emitted_at = 13;
}


// Index Service
service IndexService {
  rpc CreateIndex(CreateIndexRequest) returns (IndexDefinitionResponse);
  rpc UpdateIndex(UpdateIndexRequest) returns (IndexDefinitionResponse);
  rpc DisableIndex(DisableIndexRequest) returns (IndexDefinitionResponse);
  rpc DropIndex(DropIndexRequest) returns (DropIndexResponse);
  rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse);
  rpc QueryIndex(QueryIndexRequest) returns (QueryIndexResponse);
  rpc QuerySpec(QuerySpecRequest) returns (QuerySpecResponse);
  rpc WatchIndexDefinition(WatchIndexDefinitionRequest) returns (stream WatchIndexDefinitionResponse);
  rpc WatchIndexPartition(WatchIndexPartitionRequest) returns (stream WatchIndexPartitionResponse);
  rpc ListIndexDiagnostics(ListIndexDiagnosticsRequest) returns (ListIndexDiagnosticsResponse);
}

service RepairService {
  rpc RepairIndex(RepairIndexRequest) returns (RepairIndexResponse);
  rpc RepairDirectoryIndex(RepairDirectoryIndexRequest) returns (RepairDirectoryIndexResponse);
  rpc RepairAuthzDerivedIndex(RepairAuthzDerivedIndexRequest) returns (RepairAuthzDerivedIndexResponse);
  rpc RepairPersonalDbLogChain(RepairPersonalDbLogChainRequest) returns (RepairPersonalDbLogChainResponse);
  rpc ListRepairFindings(ListRepairFindingsRequest) returns (ListRepairFindingsResponse);
}

service GitSourceService {
  rpc PutGitPack(stream PutGitPackRequest) returns (PutGitPackResponse);
  rpc GetGitObject(GetGitObjectRequest) returns (GetGitObjectResponse);
  rpc GetGitBlobByPath(GetGitBlobByPathRequest) returns (GetGitBlobByPathResponse);
  rpc ListGitTree(ListGitTreeRequest) returns (ListGitTreeResponse);
  rpc WatchGitSource(WatchGitSourceRequest) returns (stream WatchGitSourceResponse);
}

message PutGitPackRequest {
    oneof data {
        GitPackMetadata metadata = 1;
        bytes chunk = 2;
    }
}

message GitPackMetadata {
    string repository_id = 1;
    string bucket_name = 2;
}

message PutGitPackResponse {
    string repository_id = 1;
    string bucket_name = 2;
    string object_key = 3;
    string version_id = 4;
    string payload_hash = 5;
