message OwnershipResource {
    OwnershipResourceKind resource_kind = 1;
    string resource_id = 2;
}

message AcquireOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    // Non-authoritative diagnostic label. The stored security owner is derived
    // from authenticated claims on the server.
    string owner_label = 3;
    OwnershipResource resource = 4;
    uint64 requested_lease_ms = 5;
}

message RenewOwnershipRequest {
    string request_id = 1;
    // Non-authoritative diagnostic label. The authenticated owner still wins.
    string owner_label = 2;
    OwnershipResource resource = 3;
    uint64 current_fence = 4;
    uint64 requested_lease_ms = 5;
}

message TransferOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    // Non-authoritative diagnostic label for the caller.
    string owner_label = 3;
    OwnershipResource resource = 4;
    uint64 current_fence = 5;
    // Non-authoritative diagnostic label for the post-transfer owner record.
    string new_owner_label = 6;
    string new_owner_principal_kind = 7;
    string new_owner_principal_id = 8;
    string new_owner_actor_instance_id = 9;
    string new_owner_region = 10;
    string new_owner_cell = 11;
}

message ReleaseOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    // Non-authoritative diagnostic label. The stored security owner is derived
    // from authenticated claims on the server.
    string owner_label = 3;
    OwnershipResource resource = 4;
    uint64 current_fence = 5;
    bool administrative_force = 6;
}

message ForceExpireOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    OwnershipResource resource = 3;
    string reason = 4;
}

