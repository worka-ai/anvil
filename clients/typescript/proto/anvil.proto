// Object Service
service ObjectService {
  rpc PutObject(stream PutObjectRequest) returns (PutObjectResponse);
  rpc GetObject(GetObjectRequest) returns (stream GetObjectResponse);
  rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectResponse);
  rpc HeadObject(HeadObjectRequest) returns (HeadObjectResponse);
  rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse);
  rpc ListObjectVersions(ListObjectVersionsRequest) returns (ListObjectVersionsResponse);
  rpc CopyObject(CopyObjectRequest) returns (CopyObjectResponse);
  rpc ComposeObject(ComposeObjectRequest) returns (ComposeObjectResponse);
  rpc PatchJsonObject(PatchJsonObjectRequest) returns (PatchJsonObjectResponse);
  rpc CompareAndSwapManifest(CompareAndSwapManifestRequest) returns (CompareAndSwapManifestResponse);
  rpc CreateObjectLink(CreateObjectLinkRequest) returns (ObjectLinkResponse);
  rpc UpdateObjectLink(UpdateObjectLinkRequest) returns (ObjectLinkResponse);
  rpc DeleteObjectLink(DeleteObjectLinkRequest) returns (MutationResponse);
  rpc ReadObjectLink(ReadObjectLinkRequest) returns (ObjectLinkResponse);
  rpc ListObjectLinks(ListObjectLinksRequest) returns (ListObjectLinksResponse);
  rpc CreateHostAlias(CreateHostAliasRequest) returns (HostAliasResponse);
  rpc VerifyHostAlias(VerifyHostAliasRequest) returns (HostAliasResponse);
  rpc DeleteHostAlias(DeleteHostAliasRequest) returns (MutationResponse);
  rpc ReadHostAlias(ReadHostAliasRequest) returns (HostAliasResponse);
  rpc ListHostAliases(ListHostAliasesRequest) returns (ListHostAliasesResponse);
  rpc WatchPrefix(WatchPrefixRequest) returns (stream WatchPrefixResponse);
  rpc PutBoundarySchema(PutBoundarySchemaRequest) returns (BoundarySchemaResponse);
  rpc GetBoundarySchema(GetBoundarySchemaRequest) returns (BoundarySchemaResponse);
  rpc StartBoundaryMigration(StartBoundaryMigrationRequest) returns (WriteResponse);
  rpc GetBoundaryMigration(GetBoundaryMigrationRequest) returns (BoundaryMigrationStatus);
  rpc CreateAppendStream(CreateAppendStreamRequest) returns (CreateAppendStreamResponse);
  rpc AppendStreamRecord(AppendStreamRecordRequest) returns (AppendStreamRecordResponse);
  rpc ReadAppendStream(ReadAppendStreamRequest) returns (ReadAppendStreamResponse);
  rpc TailAppendStream(TailAppendStreamRequest) returns (stream TailAppendStreamResponse);
  rpc SealAppendStreamSegment(SealAppendStreamSegmentRequest) returns (SealAppendStreamSegmentResponse);
  rpc MutationBatch(MutationBatchRequest) returns (MutationBatchResponse);
  rpc InitiateMultipartUpload(InitiateMultipartRequest) returns (InitiateMultipartResponse);
  rpc UploadPart(stream UploadPartRequest) returns (UploadPartResponse);
  rpc CompleteMultipartUpload(CompleteMultipartRequest) returns (CompleteMultipartResponse);
  rpc AbortMultipartUpload(AbortMultipartRequest) returns (AbortMultipartResponse);
}

service TransactionService {
  rpc BeginTransaction(BeginTransactionRequest) returns (BeginTransactionResponse);
  rpc CommitTransaction(CommitTransactionRequest) returns (WriteResponse);
  rpc RollbackTransaction(RollbackTransactionRequest) returns (RollbackTransactionResponse);
  rpc GetTransaction(GetTransactionRequest) returns (TransactionStatus);
}

service SagaService {
  rpc StartSaga(StartSagaRequest) returns (StartSagaResponse);
  rpc BeginSagaTransaction(BeginSagaTransactionRequest) returns (BeginSagaTransactionResponse);
  rpc SealSagaTransaction(SealSagaTransactionRequest) returns (SealSagaTransactionResponse);
  rpc StartSagaCompensationProgram(StartSagaCompensationProgramRequest) returns (StartSagaCompensationProgramResponse);
  rpc BeginSagaCompensationTransaction(BeginSagaCompensationTransactionRequest) returns (BeginSagaCompensationTransactionResponse);
  rpc SealSagaCompensationTransaction(SealSagaCompensationTransactionRequest) returns (SealSagaCompensationTransactionResponse);
  rpc SealSagaCompensationProgram(SealSagaCompensationProgramRequest) returns (SealSagaCompensationProgramResponse);
  rpc ApplySaga(ApplySagaRequest) returns (ApplySagaResponse);
  rpc GetSaga(GetSagaRequest) returns (SagaStatus);
  rpc WatchSaga(WatchSagaRequest) returns (stream SagaEvent);
  rpc CancelSaga(CancelSagaRequest) returns (SagaStatus);
  rpc AbortSagaDraft(AbortSagaDraftRequest) returns (SagaStatus);
  rpc ResolveBlockedSaga(ResolveBlockedSagaRequest) returns (SagaStatus);
}

service StreamService {
  rpc CreateStream(CreateAppendStreamRequest) returns (CreateAppendStreamResponse);
  rpc AppendRecord(AppendStreamRecordRequest) returns (AppendStreamRecordResponse);
  rpc ReadStream(ReadAppendStreamRequest) returns (ReadAppendStreamResponse);
  rpc TailStream(TailAppendStreamRequest) returns (stream TailAppendStreamResponse);
  rpc SealSegment(SealAppendStreamSegmentRequest) returns (SealAppendStreamSegmentResponse);
}


service MeshControlService {
  rpc BootstrapMeshTopology(BootstrapMeshTopologyRequest) returns (BootstrapMeshTopologyResponse);
  rpc PutRegion(PutRegionRequest) returns (WriteResponse);
  rpc PutCell(PutCellRequest) returns (WriteResponse);
  rpc PutNode(PutNodeRequest) returns (WriteResponse);
  rpc DrainNode(DrainNodeRequest) returns (WriteResponse);
  rpc DrainCell(DrainCellRequest) returns (WriteResponse);
  rpc MoveBucket(MoveBucketRequest) returns (WriteResponse);
  rpc GetPartitionMap(GetPartitionMapRequest) returns (PartitionMap);
}

service RegistryService {
  rpc PutPackageBlob(PutPackageBlobRequest) returns (WriteResponse);
  rpc PutPackageVersion(PutPackageVersionRequest) returns (WriteResponse);
  rpc PutRegistryRef(PutRegistryRefRequest) returns (WriteResponse);
  rpc GetPackageVersion(GetPackageVersionRequest) returns (PackageVersion);
  rpc ListPackageVersions(ListPackageVersionsRequest) returns (ListPackageVersionsResponse);
}

message PutObjectRequest {
    oneof data {
        ObjectMetadata metadata = 1;
        bytes chunk = 2;
    }
}

message NativeMutationContext {
    int64 tenant_id = 1;
    int64 bucket_id = 2;
    string principal = 3;
    string request_id = 4;
    string precondition = 5;
    string authz_zookie_optional = 6;
    string idempotency_key = 7;
    optional string transaction_id = 8;
    optional SagaOperationContext saga_operation = 9;
    optional SagaCompensationOperationContext saga_compensation_operation = 10;
}

message ObjectMetadata {
    string bucket_name = 1;
    string object_key = 2;
    NativeMutationContext mutation_context = 3;
    optional string content_type = 4;
    string user_metadata_json = 5;
    optional string storage_class = 6;
}

message PutObjectResponse {
    string etag = 1;
    string version_id = 2;
    string mutation_id = 3;
    string payload_hash = 4;
    string record_hash = 5;
    uint64 authz_revision = 6;
    string index_policy_snapshot = 7;
    uint64 watch_cursor = 8;
    WriteState write_state = 9;
}

message GetObjectRequest {
    string bucket_name = 1;
    string object_key = 2;
