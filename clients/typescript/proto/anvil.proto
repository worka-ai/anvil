    }
    uint64 logical_offset = 3;
    string trace_id = 4;
}

message ObjectInfo {
    string content_type = 1;
    int64 content_length = 2;
    string version_id = 3;
    string user_metadata_json = 4;
    string storage_class = 5;
}

message ByteRange {
    uint64 start = 1;
    uint64 end_exclusive = 2;
}


message DeleteObjectRequest {
    string bucket_name = 1;
    string object_key = 2;
    optional string version_id = 3;
