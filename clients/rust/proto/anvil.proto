message AcquireTaskLeaseRequest {
    string task_id = 1;
    string task_kind = 2;
    string partition_family = 3;
    string partition_id = 4;
    // Non-authoritative diagnostic label. The stored lease owner is derived from authenticated claims.
    string owner_label = 5;
    uint64 source_cursor_low = 6;
    uint64 source_cursor_high = 7;
    int64 requested_ttl_nanos = 8;
}

message CheckpointTaskLeaseRequest {
    string task_id = 1;
    reserved 2;
    reserved "owner_node_id";
    uint64 fence_token = 3;
    uint64 checkpoint_cursor_low = 4;
    uint64 checkpoint_cursor_high = 5;
}

message CommitTaskLeaseRequest {
    string task_id = 1;
    reserved 2;
    reserved "owner_node_id";
    uint64 fence_token = 3;
    uint64 committed_cursor_low = 4;
    uint64 committed_cursor_high = 5;
}

message ReadTaskLeaseRequest {
    string task_id = 1;
}

message ForceReleaseTaskLeaseRequest {
    string task_id = 1;
}

message TaskLease {
    string task_id = 1;
    string task_kind = 2;
    string partition_family = 3;
    string partition_id = 4;
    string owner_label = 5;
    uint64 fence_token = 6;
    uint64 source_cursor_low = 7;
    uint64 source_cursor_high = 8;
    uint64 checkpoint_cursor_low = 9;
    uint64 checkpoint_cursor_high = 10;
    uint64 lease_epoch = 11;
    int64 acquired_at_nanos = 12;
    int64 expires_at_nanos = 13;
    int64 updated_at_nanos = 14;
    string lease_hash = 15;
    string lease_signature = 16;
    int64 owner_tenant_id = 17;
    string owner_principal_kind = 18;
    string owner_principal_id = 19;
    string owner_actor_instance_id = 20;
}

message TaskLeaseResponse {
    TaskLease lease = 1;
}

message ReadTaskLeaseResponse {
    TaskLease lease = 1;
    bool found = 2;
}

message CommitTaskLeaseResponse {
    bool committed = 1;
    TaskLease previous_lease = 2;
}

message ForceReleaseTaskLeaseResponse {
    bool released = 1;
    TaskLease previous_lease = 2;
}

message OwnershipResource {
    OwnershipResourceKind resource_kind = 1;
    string resource_id = 2;
}

message AcquireOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    // Non-authoritative diagnostic label. The stored security owner is derived
    // from authenticated claims on the server.
    string owner_label = 3;
    OwnershipResource resource = 4;
    uint64 requested_lease_ms = 5;
}

message RenewOwnershipRequest {
    string request_id = 1;
    // Non-authoritative diagnostic label. The authenticated owner still wins.
    string owner_label = 2;
    OwnershipResource resource = 3;
    uint64 current_fence = 4;
    uint64 requested_lease_ms = 5;
}

message TransferOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    // Non-authoritative diagnostic label for the caller.
    string owner_label = 3;
    OwnershipResource resource = 4;
    uint64 current_fence = 5;
    // Non-authoritative diagnostic label for the post-transfer owner record.
    string new_owner_label = 6;
    string new_owner_principal_kind = 7;
    string new_owner_principal_id = 8;
    string new_owner_actor_instance_id = 9;
    string new_owner_region = 10;
    string new_owner_cell = 11;
}

message ReleaseOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    // Non-authoritative diagnostic label. The stored security owner is derived
    // from authenticated claims on the server.
    string owner_label = 3;
    OwnershipResource resource = 4;
    uint64 current_fence = 5;
    bool administrative_force = 6;
}

message ForceExpireOwnershipRequest {
    string request_id = 1;
    string idempotency_key = 2;
    OwnershipResource resource = 3;
    string reason = 4;
}

message OwnershipFenceResponse {
    string request_id = 1;
    OwnershipResource resource = 2;
    string owner_node_id = 3;
    string owner_region = 4;
    string owner_cell = 5;
    uint64 fence = 6;
    OwnershipFenceState state = 7;
    string lease_expires_at = 8;
    uint64 generation = 9;
    bool idempotent_replay = 10;
    int64 owner_tenant_id = 11;
    string owner_principal_kind = 12;
    string owner_principal_id = 13;
    string owner_actor_instance_id = 14;
}

enum OwnershipResourceKind {
    OWNERSHIP_RESOURCE_KIND_UNSPECIFIED = 0;
    OWNERSHIP_RESOURCE_KIND_CONTROL_PARTITION = 1;
    OWNERSHIP_RESOURCE_KIND_BUCKET_PRIMARY = 2;
    OWNERSHIP_RESOURCE_KIND_OBJECT_PARTITION = 3;
    OWNERSHIP_RESOURCE_KIND_INDEX_PARTITION = 4;
    OWNERSHIP_RESOURCE_KIND_PERSONALDB_GROUP = 5;
    OWNERSHIP_RESOURCE_KIND_TASK_QUEUE = 6;
    OWNERSHIP_RESOURCE_KIND_WATCH_PARTITION = 7;
}

enum OwnershipFenceState {
    OWNERSHIP_FENCE_STATE_UNSPECIFIED = 0;
    OWNERSHIP_FENCE_STATE_ACTIVE = 1;
    OWNERSHIP_FENCE_STATE_TRANSFERRING = 2;
    OWNERSHIP_FENCE_STATE_DRAINING = 3;
    OWNERSHIP_FENCE_STATE_EXPIRED = 4;
    OWNERSHIP_FENCE_STATE_RELEASED = 5;
}

