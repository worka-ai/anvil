}

message AuthzRelationRule {
    string kind = 1;             // inherit, computed, tuple_to_userset
    string relation = 2;         // inherit target for kind=inherit
    string tuple_relation = 3;   // tuple relation for computed / tuple_to_userset
    string target_relation = 4;  // target relation for computed / tuple_to_userset
}

message AuthzRelationSchema {
    string relation = 1;
