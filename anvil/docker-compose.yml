version: "3.8"

networks:
  anvilnet:
    driver: bridge

services:
  anvil1:
    image: ghcr.io/anvil-storage/anvil:latest
    environment:
      - RUST_LOG=info
      - REGION=DOCKER_TEST
      - JWT_SECRET=docker-test-secret
      - ANVIL_SECRET_ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - API_LISTEN_ADDR=0.0.0.0:50051
      - PUBLIC_API_ADDR=http://anvil1:50051
      - STORAGE_PATH=/var/lib/anvil
    ports:
      - "50051:50051"
    volumes:
      - anvil1_data:/var/lib/anvil
    networks: [anvilnet]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50051/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  anvil2:
    image: ghcr.io/anvil-storage/anvil:latest
    depends_on:
      anvil1:
        condition: service_started
    environment:
      - RUST_LOG=info
      - REGION=DOCKER_TEST
      - JWT_SECRET=docker-test-secret
      - ANVIL_SECRET_ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - API_LISTEN_ADDR=0.0.0.0:50051
      - PUBLIC_API_ADDR=http://anvil2:50051
      - STORAGE_PATH=/var/lib/anvil
    ports:
      - "50052:50051"
    volumes:
      - anvil2_data:/var/lib/anvil
    networks: [anvilnet]

  anvil3:
    image: ghcr.io/anvil-storage/anvil:latest
    depends_on:
      anvil1:
        condition: service_started
    environment:
      - RUST_LOG=info
      - REGION=DOCKER_TEST
      - JWT_SECRET=docker-test-secret
      - ANVIL_SECRET_ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - API_LISTEN_ADDR=0.0.0.0:50051
      - PUBLIC_API_ADDR=http://anvil3:50051
      - STORAGE_PATH=/var/lib/anvil
    ports:
      - "50053:50051"
    volumes:
      - anvil3_data:/var/lib/anvil
    networks: [anvilnet]

volumes:
  anvil1_data:
  anvil2_data:
  anvil3_data:
