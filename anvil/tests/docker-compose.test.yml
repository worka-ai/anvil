# This Docker Compose file is exclusively for the end-to-end test.
# It uses environment variables to dynamically set the image and optional host
# API ports. Cluster UDP ports are intentionally not published to the host;
# nodes communicate over the compose network.

networks:
  anvilnet:
    driver: bridge

services:
  anvil1:
    image: ${ANVIL_IMAGE}
    pull_policy: never
    environment:
      - RUST_LOG=${ANVIL_TEST_LOG:-warn}
      - ANVIL_TEST_TIMINGS=${ANVIL_TEST_TIMINGS:-}
      - ANVIL_PERF_TRACE=${ANVIL_PERF_TRACE:-}
      - ANVIL_PERF_GREPTIME_URL=${ANVIL_PERF_GREPTIME_URL:-}
      - REGION=${ANVIL_DOCKER_TEST_REGION:-test-region-1}
      - CELL_ID=test-cell-1
      - NODE_ID=anvil-test-node-1
      - PUBLIC_REGION_BASE_DOMAIN=anvil-storage.test
      - CORESTORE_INTERNAL_BEARER_TOKEN=${ANVIL_TEST_NODE1_TOKEN:?ANVIL_TEST_NODE1_TOKEN is required}
      - JWT_SECRET=${ANVIL_DOCKER_TEST_JWT_SECRET:-docker-test-secret}
      - ANVIL_SECRET_ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - ANVIL_SECRET_ENCRYPTION_KEY_ID=docker-test-primary
      - CLUSTER_SECRET=docker-cluster-secret
      - API_LISTEN_ADDR=0.0.0.0:50051
      - ADMIN_LISTEN_ADDR=0.0.0.0:50052
      - ALLOW_PUBLIC_ADMIN_LISTENER=true
      - BOOTSTRAP_SYSTEM_ADMIN_SUBJECT_KIND=app
      - BOOTSTRAP_SYSTEM_ADMIN_SUBJECT_ID=docker-system-admin
      - BOOTSTRAP_NODE_IDS=anvil-test-node-1,anvil-test-node-2,anvil-test-node-3,anvil-test-node-4,anvil-test-node-5,anvil-test-node-6
      - ANVIL_PUBLIC_ENDPOINT=http://127.0.0.1:50051
      - ANVIL_ADMIN_ENDPOINT=http://127.0.0.1:50052
      - CLUSTER_LISTEN_ADDR=/ip4/0.0.0.0/udp/7443/quic-v1
      - PUBLIC_CLUSTER_ADDRS=/dns4/anvil1/udp/7443/quic-v1
      - PUBLIC_API_ADDR=http://anvil1:50051
      - ENABLE_MDNS=false
      - STORAGE_PATH=/var/lib/anvil
    command:
      - /bin/sh
      - /usr/local/share/anvil/start-personaldb-test-signers.sh
      - anvil-server
      - --init-cluster
    ports:
      - "${ANVIL_TEST_API1_PORT:-55051}:50051"
      - "${ANVIL_TEST_ADMIN1_PORT:-56051}:50052"
    volumes:
      - anvil1_data:/var/lib/anvil
      - ./fixtures/start-personaldb-test-signers.sh:/usr/local/share/anvil/start-personaldb-test-signers.sh:ro
    networks: [anvilnet]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50051/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

