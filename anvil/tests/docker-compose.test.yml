# This Docker Compose file is exclusively for the end-to-end test.
# It uses environment variables to dynamically set the image and optional host
# API ports. Cluster UDP ports are intentionally not published to the host;
# nodes communicate over the compose network.

networks:
  anvilnet:
    driver: bridge

services:
  anvil1:
    image: ${ANVIL_IMAGE}
    pull_policy: never
    environment:
      - RUST_LOG=info
      - REGION=docker-test
      - JWT_SECRET=docker-test-secret
      - ANVIL_SECRET_ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - ANVIL_SECRET_ENCRYPTION_KEY_ID=docker-test-primary
      - CLUSTER_SECRET=docker-cluster-secret
      - API_LISTEN_ADDR=0.0.0.0:50051
      - ADMIN_LISTEN_ADDR=0.0.0.0:50052
      - ALLOW_PUBLIC_ADMIN_LISTENER=true
      - BOOTSTRAP_SYSTEM_ADMIN_APP_NAME=docker-admin
      - BOOTSTRAP_SYSTEM_ADMIN_CREDENTIAL_OUTPUT_PATH=/var/lib/anvil/bootstrap/admin.json
      - ANVIL_BOOTSTRAP_CREDENTIAL_FILE=/var/lib/anvil/bootstrap/admin.json
      - ANVIL_PUBLIC_ENDPOINT=http://127.0.0.1:50051
      - ANVIL_ADMIN_ENDPOINT=http://127.0.0.1:50052
      - CLUSTER_LISTEN_ADDR=/ip4/0.0.0.0/udp/7443/quic-v1
      - PUBLIC_CLUSTER_ADDRS=/dns4/anvil1/udp/7443/quic-v1
      - PUBLIC_API_ADDR=http://anvil1:50051
      - ENABLE_MDNS=false
      - STORAGE_PATH=/var/lib/anvil
    command: ["anvil-server", "--init-cluster"]
    ports:
      - "${ANVIL_TEST_API1_PORT:-55051}:50051"
    volumes:
      - anvil1_data:/var/lib/anvil
    networks: [anvilnet]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50051/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  anvil2:
    image: ${ANVIL_IMAGE}
    pull_policy: never
    depends_on:
      anvil1:
        condition: service_started
    environment:
      - RUST_LOG=info
      - REGION=docker-test
      - JWT_SECRET=docker-test-secret
      - ANVIL_SECRET_ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - ANVIL_SECRET_ENCRYPTION_KEY_ID=docker-test-primary
      - CLUSTER_SECRET=docker-cluster-secret
      - API_LISTEN_ADDR=0.0.0.0:50051
      - ADMIN_LISTEN_ADDR=0.0.0.0:50052
      - ALLOW_PUBLIC_ADMIN_LISTENER=true
      - BOOTSTRAP_SYSTEM_ADMIN_APP_NAME=docker-admin
      - BOOTSTRAP_SYSTEM_ADMIN_CREDENTIAL_OUTPUT_PATH=/var/lib/anvil/bootstrap/admin.json
      - ANVIL_BOOTSTRAP_CREDENTIAL_FILE=/var/lib/anvil/bootstrap/admin.json
      - ANVIL_PUBLIC_ENDPOINT=http://127.0.0.1:50051
      - ANVIL_ADMIN_ENDPOINT=http://127.0.0.1:50052
      - CLUSTER_LISTEN_ADDR=/ip4/0.0.0.0/udp/7444/quic-v1
      - PUBLIC_CLUSTER_ADDRS=/dns4/anvil2/udp/7444/quic-v1
      - PUBLIC_API_ADDR=http://anvil2:50051
      - ENABLE_MDNS=false
      - BOOTSTRAP_ADDRS=/dns4/anvil1/udp/7443/quic-v1
      - STORAGE_PATH=/var/lib/anvil
    ports:
      - "${ANVIL_TEST_API2_PORT:-55052}:50051"
    volumes:
      - anvil2_data:/var/lib/anvil
    networks: [anvilnet]

  anvil3:
    image: ${ANVIL_IMAGE}
    pull_policy: never
    depends_on:
      anvil1:
        condition: service_started
    environment:
      - RUST_LOG=info
      - REGION=docker-test
      - JWT_SECRET=docker-test-secret
      - ANVIL_SECRET_ENCRYPTION_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - ANVIL_SECRET_ENCRYPTION_KEY_ID=docker-test-primary
      - CLUSTER_SECRET=docker-cluster-secret
      - API_LISTEN_ADDR=0.0.0.0:50051
      - ADMIN_LISTEN_ADDR=0.0.0.0:50052
      - ALLOW_PUBLIC_ADMIN_LISTENER=true
      - BOOTSTRAP_SYSTEM_ADMIN_APP_NAME=docker-admin
      - BOOTSTRAP_SYSTEM_ADMIN_CREDENTIAL_OUTPUT_PATH=/var/lib/anvil/bootstrap/admin.json
      - ANVIL_BOOTSTRAP_CREDENTIAL_FILE=/var/lib/anvil/bootstrap/admin.json
      - ANVIL_PUBLIC_ENDPOINT=http://127.0.0.1:50051
      - ANVIL_ADMIN_ENDPOINT=http://127.0.0.1:50052
      - CLUSTER_LISTEN_ADDR=/ip4/0.0.0.0/udp/7445/quic-v1
      - PUBLIC_CLUSTER_ADDRS=/dns4/anvil3/udp/7445/quic-v1
      - PUBLIC_API_ADDR=http://anvil3:50051
      - ENABLE_MDNS=false
      - BOOTSTRAP_ADDRS=/dns4/anvil1/udp/7443/quic-v1
      - STORAGE_PATH=/var/lib/anvil
    ports:
      - "${ANVIL_TEST_API3_PORT:-55053}:50051"
    volumes:
      - anvil3_data:/var/lib/anvil
    networks: [anvilnet]

volumes:
  anvil1_data:
  anvil2_data:
  anvil3_data:
