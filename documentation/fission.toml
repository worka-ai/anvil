targets = ["site"]

[app]
name = "Anvil Documentation"
app_id = "org.anvil.storage.docs"

[package]
icon = "assets/app-icon.png"

[site]
entry = "crate::site_app"
base_path = "/"
out_dir = "target/fission/site"
default_locale = "en-GB"
generate_sitemap = false
generate_robots = false
title = "Anvil"
description = "Anvil is a production object store with native indexing, vector search, full text search, relationship authorisation, watch streams, and PersonalDB witness support."
logo = "/app-icon.png"
favicon = "/app-icon.png"
asset_dirs = ["assets", "site/highlight"]
css_files = ["site/overrides.css"]

[site.code_highlighting]
enabled = true
stylesheet_href = "/anvil-highlight.css"
script_src = "/anvil-highlight.js"

[site.search]
enabled = true

[[site.elements]]
placement = "body-end"
file = "site/tutorial-tabs.html"
route_prefixes = ["/tutorials"]


[[site.nav]]
title = "Home"
href = "/"

[[site.nav]]
title = "Learn"
href = "/learn/overview/"

[[site.nav]]
title = "Architecture"
href = "/architecture/overview/"

[[site.nav]]
title = "Tutorials"
href = "/tutorials/overview/"

[[site.nav]]
title = "Operators"
href = "/operators/overview/"

[[site.nav]]
title = "Reference"
href = "/reference/public-cli/"

[[site.nav]]
title = "Blog"
href = "/blog/admin-api-key-rotation/"

[[site.routes]]
kind = "content"
path = "/learn"
source = "content/learn"
template = "fission::site::documentation"
sidebar = "site/learn-sidebar.toml"

[[site.routes]]
kind = "content"
path = "/architecture"
source = "content/architecture"
template = "fission::site::documentation"
sidebar = "site/architecture-sidebar.toml"

[[site.routes]]
kind = "content"
path = "/tutorials"
source = "content/tutorials"
template = "fission::site::documentation"
sidebar = "site/tutorial-sidebar.toml"

[[site.routes]]
kind = "content"
path = "/operators"
source = "content/operators"
template = "fission::site::documentation"
sidebar = "site/operator-sidebar.toml"

[[site.routes]]
kind = "content"
path = "/reference"
source = "content/reference"
template = "fission::site::documentation"
sidebar = "site/reference-sidebar.toml"

[[site.routes]]
kind = "content"
path = "/blog"
source = "content/blog"
template = "fission::site::documentation"
sidebar = "site/blog-sidebar.toml"
