<script>
(function () {
  function text(value) {
    return document.createTextNode(value || "");
  }

  function pane(language, code) {
    const panel = document.createElement("div");
    panel.className = "anvil-tab-panel anvil-tab-" + language;
    const pre = document.createElement("pre");
    const el = document.createElement("code");
    el.className = "language-" + language;
    el.textContent = code || "";
    pre.appendChild(el);
    panel.appendChild(pre);
    return panel;
  }

  function buildTabs(payload, index) {
    const operation = payload.operation || ("operation-" + index);
    const id = operation.toLowerCase().replace(/[^a-z0-9]+/g, "-") + "-" + index;
    const root = document.createElement("div");
    root.className = "anvil-code-tabs";
    root.dataset.operation = operation;
    const languages = [
      ["rust", "Rust"]
    ];
    for (const [language, label] of languages) {
      const input = document.createElement("input");
      input.type = "radio";
      input.id = id + "-" + language;
      input.name = id + "-tabs";
      if (language === "rust") input.checked = true;
      const tab = document.createElement("label");
      tab.htmlFor = input.id;
      tab.appendChild(text(label));
      root.appendChild(input);
      root.appendChild(tab);
    }
    root.appendChild(pane("rust", payload.rust));
    return root;
  }

  function highlightTabs(root) {
    if (!window.hljs || !window.hljs.highlightElement) return;
    root.querySelectorAll("pre code").forEach((block) => {
      window.hljs.highlightElement(block);
    });
  }

  function upgrade() {
    const blocks = Array.from(document.querySelectorAll("code.language-anvil-tabs"));
    blocks.forEach((block, index) => {
      let payload;
      try {
        payload = JSON.parse(block.textContent || "{}");
      } catch (error) {
        return;
      }
      const pre = block.closest("pre") || block.parentElement;
      if (!pre || !pre.parentNode) return;
      const tabs = buildTabs(payload, index);
      pre.replaceWith(tabs);
      highlightTabs(tabs);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", upgrade);
  } else {
    upgrade();
  }
})();
</script>
