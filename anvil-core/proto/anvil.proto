syntax = "proto3";

package anvil;

// Bucket Service
service BucketService {
  rpc CreateBucket(CreateBucketRequest) returns (CreateBucketResponse);
  rpc DeleteBucket(DeleteBucketRequest) returns (DeleteBucketResponse);
  rpc ListBuckets(ListBucketsRequest) returns (ListBucketsResponse);
  rpc GetBucketPolicy(GetBucketPolicyRequest) returns (GetBucketPolicyResponse);
  rpc PutBucketPolicy(PutBucketPolicyRequest) returns (PutBucketPolicyResponse);
  rpc WatchBucketMetadata(WatchBucketMetadataRequest) returns (stream WatchBucketMetadataResponse);
}

message CreateBucketRequest {
  string bucket_name = 1;
  string region = 2;
}

message CreateBucketResponse {}

message DeleteBucketRequest {
  string bucket_name = 1;
}

message DeleteBucketResponse {}

message ListBucketsRequest {}

message Bucket {
    string name = 1;
    string creation_date = 2;
    string region = 3;
    bool is_public_read = 4;
    bool deleted = 5;
}

message ListBucketsResponse {
    repeated Bucket buckets = 1;
}

message GetBucketPolicyRequest {
    string bucket_name = 1;
}

message GetBucketPolicyResponse {
    string policy_json = 1;
}

message PutBucketPolicyRequest {
    string bucket_name = 1;
    string policy_json = 2;
}

message PutBucketPolicyResponse {}

message WatchBucketMetadataRequest {
    string bucket_name = 1;
    uint64 after_cursor = 2;
}

message WatchBucketMetadataResponse {
    uint64 cursor = 1;
    string event_type = 2;
    Bucket bucket = 3;
    string emitted_at = 4;
}


// Index Service
service IndexService {
  rpc CreateIndex(CreateIndexRequest) returns (IndexDefinitionResponse);
  rpc UpdateIndex(UpdateIndexRequest) returns (IndexDefinitionResponse);
  rpc DisableIndex(DisableIndexRequest) returns (IndexDefinitionResponse);
  rpc DropIndex(DropIndexRequest) returns (DropIndexResponse);
  rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse);
  rpc WatchIndexDefinition(WatchIndexDefinitionRequest) returns (stream WatchIndexDefinitionResponse);
}

message CreateIndexRequest {
    string bucket_name = 1;
    string name = 2;
    string kind = 3;
    string selector_json = 4;
    string extractor_json = 5;
    string authorization_mode = 6;
    string build_policy_json = 7;
}

message UpdateIndexRequest {
    string bucket_name = 1;
    string name = 2;
    string selector_json = 3;
    string extractor_json = 4;
    string authorization_mode = 5;
    string build_policy_json = 6;
}

message DisableIndexRequest {
    string bucket_name = 1;
    string name = 2;
}

message DropIndexRequest {
    string bucket_name = 1;
    string name = 2;
}

message DropIndexResponse {}

message ListIndexesRequest {
    string bucket_name = 1;
    bool include_disabled = 2;
}

message IndexDefinitionRecord {
    uint64 index_id = 1;
    string bucket_name = 2;
    string name = 3;
    string kind = 4;
    string selector_json = 5;
    string extractor_json = 6;
    string authorization_mode = 7;
    string build_policy_json = 8;
    bool enabled = 9;
    uint64 version = 10;
    string created_at = 11;
    string updated_at = 12;
}

message IndexDefinitionResponse {
    IndexDefinitionRecord index = 1;
}

message ListIndexesResponse {
    repeated IndexDefinitionRecord indexes = 1;
}

message WatchIndexDefinitionRequest {
    string bucket_name = 1;
    uint64 after_cursor = 2;
}

message WatchIndexDefinitionResponse {
    uint64 cursor = 1;
    string event_type = 2;
    IndexDefinitionRecord index = 3;
    string emitted_at = 4;
}

// Object Service
service ObjectService {
  rpc PutObject(stream PutObjectRequest) returns (PutObjectResponse);
  rpc GetObject(GetObjectRequest) returns (stream GetObjectResponse);
  rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectResponse);
  rpc HeadObject(HeadObjectRequest) returns (HeadObjectResponse);
  rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse);
  rpc ListObjectVersions(ListObjectVersionsRequest) returns (ListObjectVersionsResponse);
  rpc CopyObject(CopyObjectRequest) returns (CopyObjectResponse);
  rpc ComposeObject(ComposeObjectRequest) returns (ComposeObjectResponse);
  rpc PatchJsonObject(PatchJsonObjectRequest) returns (PatchJsonObjectResponse);
  rpc CompareAndSwapManifest(CompareAndSwapManifestRequest) returns (CompareAndSwapManifestResponse);
  rpc WatchPrefix(WatchPrefixRequest) returns (stream WatchPrefixResponse);
  rpc CreateAppendStream(CreateAppendStreamRequest) returns (CreateAppendStreamResponse);
  rpc AppendStreamRecord(AppendStreamRecordRequest) returns (AppendStreamRecordResponse);
  rpc SealAppendStreamSegment(SealAppendStreamSegmentRequest) returns (SealAppendStreamSegmentResponse);
  rpc InitiateMultipartUpload(InitiateMultipartRequest) returns (InitiateMultipartResponse);
  rpc UploadPart(stream UploadPartRequest) returns (UploadPartResponse);
  rpc CompleteMultipartUpload(CompleteMultipartRequest) returns (CompleteMultipartResponse);
  rpc AbortMultipartUpload(AbortMultipartRequest) returns (AbortMultipartResponse);
}

message PutObjectRequest {
    oneof data {
        ObjectMetadata metadata = 1;
        bytes chunk = 2;
    }
}

message ObjectMetadata {
    string bucket_name = 1;
    string object_key = 2;
}

message PutObjectResponse {
    string etag = 1;
    string version_id = 2;
}

message GetObjectRequest {
    string bucket_name = 1;
    string object_key = 2;
    optional string version_id = 3;
}

message GetObjectResponse {
    oneof data {
        ObjectInfo metadata = 1;
        bytes chunk = 2;
    }
}

message ObjectInfo {
    string content_type = 1;
    int64 content_length = 2;
}


message DeleteObjectRequest {
    string bucket_name = 1;
    string object_key = 2;
    optional string version_id = 3;
}

message DeleteObjectResponse {}

message HeadObjectRequest {
    string bucket_name = 1;
    string object_key = 2;
    optional string version_id = 3;
}

message HeadObjectResponse {
    string etag = 1;
    int64 size = 2;
    string last_modified = 3;
}

message ListObjectsRequest {
    string bucket_name = 1;
    string prefix = 2;
    string delimiter = 3;
    string start_after = 4;
    int32 max_keys = 5;
}

message ObjectSummary {
    string key = 1;
    int64 size = 2;
    string etag = 3;
    string last_modified = 4;
}

message ListObjectsResponse {
    repeated ObjectSummary objects = 1;
    repeated string common_prefixes = 2;
}

message ListObjectVersionsRequest {
    string bucket_name = 1;
    string prefix = 2;
    string key_marker = 3;
    int32 max_keys = 4;
}

message ObjectVersionSummary {
    string key = 1;
    string version_id = 2;
    int64 size = 3;
    string etag = 4;
    string last_modified = 5;
    bool is_delete_marker = 6;
    bool is_latest = 7;
}

message ListObjectVersionsResponse {
    repeated ObjectVersionSummary versions = 1;
}

message InitiateMultipartRequest {
    string bucket_name = 1;
    string object_key = 2;
}

message InitiateMultipartResponse {
    string upload_id = 1;
}

message UploadPartRequest {
    oneof data {
        UploadPartMetadata metadata = 1;
        bytes chunk = 2;
    }
}

message UploadPartMetadata {
    string bucket_name = 1;
    string object_key = 2;
    string upload_id = 3;
    int32 part_number = 4;
}

message UploadPartResponse {
    string etag = 1;
}

message CompleteMultipartPart {
    int32 part_number = 1;
    string etag = 2;
}

message CompleteMultipartRequest {
    string bucket_name = 1;
    string object_key = 2;
    string upload_id = 3;
    repeated CompleteMultipartPart parts = 4;
}

message CopyObjectRequest {
    string source_bucket_name = 1;
    string source_object_key = 2;
    optional string source_version_id = 3;
    string destination_bucket_name = 4;
    string destination_object_key = 5;
}

message CopyObjectResponse {
    string etag = 1;
    string version_id = 2;
    string last_modified = 3;
}

message ComposeObjectSource {
    string bucket_name = 1;
    string object_key = 2;
    optional string version_id = 3;
}

message ComposeObjectRequest {
    repeated ComposeObjectSource sources = 1;
    string destination_bucket_name = 2;
    string destination_object_key = 3;
}

message ComposeObjectResponse {
    string etag = 1;
    string version_id = 2;
    string last_modified = 3;
}

message PatchJsonObjectRequest {
    string bucket_name = 1;
    string object_key = 2;
    optional string base_version_id = 3;
    string merge_patch_json = 4;
}

message PatchJsonObjectResponse {
    string etag = 1;
    string version_id = 2;
    string last_modified = 3;
}

message CompareAndSwapManifestRequest {
    string bucket_name = 1;
    string manifest_key = 2;
    uint64 expected_revision = 3;
    string manifest_json = 4;
}

message CompareAndSwapManifestResponse {
    uint64 revision = 1;
    string manifest_hash = 2;
}

message WatchPrefixRequest {
    string bucket_name = 1;
    string prefix = 2;
    uint64 after_cursor = 3;
}

message WatchPrefixResponse {
    uint64 cursor = 1;
    string bucket_name = 2;
    string object_key = 3;
    string event_type = 4;
    string version_id = 5;
    string etag = 6;
    int64 size = 7;
    bool is_delete_marker = 8;
    string created_at = 9;
}

message CreateAppendStreamRequest {
    string bucket_name = 1;
    string stream_key = 2;
}

message CreateAppendStreamResponse {
    string stream_id = 1;
}

message AppendStreamRecordRequest {
    string bucket_name = 1;
    string stream_key = 2;
    string stream_id = 3;
    bytes payload = 4;
}

message AppendStreamRecordResponse {
    uint64 record_sequence = 1;
    string payload_hash = 2;
    int64 payload_size = 3;
}

message SealAppendStreamSegmentRequest {
    string bucket_name = 1;
    string stream_key = 2;
    string stream_id = 3;
}

message SealAppendStreamSegmentResponse {
    uint64 record_count = 1;
    string segment_hash = 2;
}

message CompleteMultipartResponse {
    string etag = 1;
    string version_id = 2;
}

message AbortMultipartRequest {
    string bucket_name = 1;
    string object_key = 2;
    string upload_id = 3;
}

message AbortMultipartResponse {}

// Internal Service for node-to-node communication
service InternalAnvilService {
  rpc PutShard(stream PutShardRequest) returns (PutShardResponse);
  rpc GetShard(GetShardRequest) returns (stream GetShardResponse);
  rpc CommitShard(CommitShardRequest) returns (CommitShardResponse);
  rpc DeleteShard(DeleteShardRequest) returns (DeleteShardResponse);
}

service AuthService {
  rpc GetAccessToken(GetAccessTokenRequest) returns (GetAccessTokenResponse);
  rpc GrantAccess(GrantAccessRequest) returns (GrantAccessResponse);
  rpc RevokeAccess(RevokeAccessRequest) returns (RevokeAccessResponse);
  rpc SetPublicAccess(SetPublicAccessRequest) returns (SetPublicAccessResponse);
  rpc WriteAuthzTuple(WriteAuthzTupleRequest) returns (WriteAuthzTupleResponse);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc WatchAuthzTupleLog(WatchAuthzTupleLogRequest) returns (stream WatchAuthzTupleLogResponse);
}

// Hugging Face Keys (public API, policy enforced)
service HuggingFaceKeyService {
  rpc CreateKey(CreateHfKeyRequest) returns (CreateHfKeyResponse);
  rpc DeleteKey(DeleteHfKeyRequest) returns (DeleteHfKeyResponse);
  rpc ListKeys(ListHfKeysRequest) returns (ListHfKeysResponse);
}

message CreateHfKeyRequest {
  string name = 1;
  string token = 2; // never returned back
  string note = 3;
}
message CreateHfKeyResponse {
  string name = 1;
  string note = 2;
  string created_at = 3;
}
message DeleteHfKeyRequest { string name = 1; }
message DeleteHfKeyResponse {}
message ListHfKeysRequest {}
message HfKey {
  string name = 1;
  string note = 2;
  string created_at = 3;
  string updated_at = 4;
}
message ListHfKeysResponse { repeated HfKey keys = 1; }

// Ingestion (public API, policy enforced)
service HfIngestionService {
  rpc StartIngestion(StartHfIngestionRequest) returns (StartHfIngestionResponse);
  rpc GetIngestionStatus(GetHfIngestionStatusRequest) returns (GetHfIngestionStatusResponse);
  rpc CancelIngestion(CancelHfIngestionRequest) returns (CancelHfIngestionResponse);
}

message StartHfIngestionRequest {
  string key_name = 1;
  string repo = 2;
  string revision = 3;
  string target_bucket = 4;
  string target_prefix = 5;
  repeated string include_globs = 6;
  repeated string exclude_globs = 7;
  string target_region = 8;
}
message StartHfIngestionResponse { string ingestion_id = 1; }

message GetHfIngestionStatusRequest { string ingestion_id = 1; }
message GetHfIngestionStatusResponse {
  string state = 1;
  uint64 queued = 2;
  uint64 downloading = 3;
  uint64 stored = 4;
  uint64 failed = 5;
  string error = 6;
  string created_at = 7;
  string started_at = 8;
  string finished_at = 9;
}

message CancelHfIngestionRequest { string ingestion_id = 1; }
message CancelHfIngestionResponse {}

message GetAccessTokenRequest {
  string client_id = 1;
  string client_secret = 2;
  repeated string scopes = 3;
}

message GetAccessTokenResponse {
  string access_token = 1;
  int64 expires_in = 2;
}

message GrantAccessRequest {
  string grantee_app_id = 1;
  string resource = 2;
  string action = 3;
}

message GrantAccessResponse {}

message RevokeAccessRequest {
  string grantee_app_id = 1;
  string resource = 2;
  string action = 3;
}

message RevokeAccessResponse {}

message SetPublicAccessRequest {
  string bucket = 1;
  bool allow_public_read = 2;
}

message SetPublicAccessResponse {}

message WriteAuthzTupleRequest {
    string namespace = 1;
    string object_id = 2;
    string relation = 3;
    string subject_kind = 4;
    string subject_id = 5;
    string caveat_hash = 6;
    string operation = 7;
    string reason = 8;
}

message WriteAuthzTupleResponse {
    uint64 revision = 1;
    string zookie = 2;
    string record_hash = 3;
}

message CheckPermissionRequest {
    string namespace = 1;
    string object_id = 2;
    string relation = 3;
    string subject_kind = 4;
    string subject_id = 5;
    string caveat_hash = 6;
    string consistency = 7;
    string zookie = 8;
}

message CheckPermissionResponse {
    bool allowed = 1;
    uint64 revision = 2;
    string zookie = 3;
    string explanation_ref = 4;
}

message WatchAuthzTupleLogRequest {
    uint64 after_revision = 1;
    string namespace = 2;
}

message WatchAuthzTupleLogResponse {
    uint64 revision = 1;
    string namespace = 2;
    string object_id = 3;
    string relation = 4;
    string subject_kind = 5;
    string subject_id = 6;
    string caveat_hash = 7;
    string operation = 8;
    string written_by = 9;
    string reason = 10;
    string record_hash = 11;
    string written_at = 12;
}


message PutShardRequest {
    string upload_id = 1;
    uint32 shard_index = 2;
    bytes data = 3;
}

message PutShardResponse {}

message CommitShardRequest {
    string upload_id = 1;
    uint32 shard_index = 2;
    string final_object_hash = 3;
}

message CommitShardResponse {}

message GetShardRequest {
    string object_hash = 1;
    uint32 shard_index = 2;
}

message GetShardResponse {
    bytes data = 1;
}

message DeleteShardRequest {
    string object_hash = 1;
    uint32 shard_index = 2;
}

message DeleteShardResponse {}

// ---------- Model Service ----------
service ModelService {
  rpc PutModelManifest(PutModelManifestRequest) returns (PutModelManifestResponse);
  rpc ListTensors(ListTensorsRequest) returns (ListTensorsResponse);
  rpc GetTensor(GetTensorRequest) returns (stream GetTensorChunk);
  rpc GetTensors(GetTensorsRequest) returns (stream GetTensorChunk);
}

message TenantScope {
  string tenant_id = 1;
  string region = 2;
}

message ObjectRef {
  string bucket = 1;
  string key = 2;
  string version_id = 3;
}

enum DType {
  DTYPE_UNSPECIFIED = 0;
  F16 = 1;
  BF16 = 2;
  F32 = 3;
  F64 = 4;
  I8 = 5;
  I16 = 6;
  I32 = 7;
  I64 = 8;
  U8 = 9;
}

message ModelManifest {
  string schema_version = 1;
  string artifact_id = 2;
  string name = 3;
  string format = 4;

  message Component {
    string path = 1;
    uint64 size = 2;
    string hash = 3;
  }
  repeated Component components = 5;

  string base_artifact_id = 6;
  repeated string delta_artifact_ids = 7;

  message Signature {
    string authority = 1;
    bytes sig = 2;
  }
  repeated Signature signatures = 8;

  string merkle_root = 9;
  map<string,string> meta = 10;
}

message TensorIndexRow {
  string tensor_name = 1;
  string file_path = 2;
  uint64 file_offset = 3;
  uint64 byte_length = 4;
  DType dtype = 5;
  repeated uint32 shape = 6;
  string layout = 7;
  uint32 block_bytes = 8;
  bytes blocks = 9;
}

message PutModelManifestRequest {
  TenantScope scope = 1;
  ObjectRef object = 2;
  ModelManifest manifest = 3;
  repeated TensorIndexRow index = 4;
}

message PutModelManifestResponse {
  string artifact_id = 1;
  string status = 2;
}

message ListTensorsRequest {
  TenantScope scope = 1;
  ObjectRef object = 2;
  string artifact_id = 3;
  string prefix = 4;
  uint32 limit = 5;
  string page_token = 6;
}

message ListTensorsResponse {
  repeated TensorIndexRow tensors = 1;
  string next_page_token = 2;
}

message GetTensorRequest {
  TenantScope scope = 1;
  ObjectRef object = 2;
  string artifact_id = 3;
  string tensor_name = 4;
  repeated uint32 slice_begin = 5;
  repeated uint32 slice_extent = 6;
}

message GetTensorChunk {
  bytes data = 1;
  uint64 offset = 2;
  bool eof = 3;
}

message GetTensorsRequest {
  TenantScope scope = 1;
  ObjectRef object = 2;
  string artifact_id = 3;
  repeated string tensor_names = 4;
}
